<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>상담 일정 선택 · Moment Edit</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<!--
  momentedit.kr/schedule — 상담 일정 선택 (자사 네이티브 페이지).
  · GAS doGet/iframe 미사용 → JSON API(getAvailability·submitSchedule)만 호출(getMyState와 동일 경로).
    → 구글 로고/주소 노출 0, third-party iframe 'Drive 파일 열 수 없음' 오류 원천 제거.
  · 세션 토큰 = 마이페이지와 동일 localStorage('me_token') 공유(같은 도메인).
-->
<style>
:root{--bg:#FAFAF8;--bg2:#F5F3EF;--card:#fff;--accent:#3A2D22;--seal:#6B2A24;--gold:#B89A75;--gold-deep:#9A7F5F;--sub:#5A554C;--light:#9A9488;--border:#DDD8D1;--hairline:#E6E1D8;--serif:'Cormorant Garamond',serif;--serif-ko:'Noto Serif KR',serif;--ease:cubic-bezier(.4,0,.2,1)}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--accent)}
body{font-family:var(--serif-ko);-webkit-font-smoothing:antialiased}
header{text-align:center;padding:26px 0 18px;border-bottom:1px solid var(--hairline)}
.wm{font-family:var(--serif);font-size:18px;letter-spacing:.34em;font-weight:500}
.wm-sub{font-family:var(--serif);font-size:8px;letter-spacing:.3em;color:var(--gold);margin-top:6px;text-transform:uppercase}
main{max-width:560px;margin:0 auto;padding:30px 22px 60px}
.eyebrow{font-family:var(--serif);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);text-align:center}
h1{font-family:var(--serif-ko);font-size:21px;font-weight:500;text-align:center;margin:8px 0 6px}
.sub{font-family:var(--serif-ko);font-size:13.5px;font-weight:300;color:var(--sub);text-align:center;line-height:1.7;margin-bottom:24px}
#loading{min-height:calc(100vh - 230px);display:flex;align-items:center;justify-content:center}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--seal);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px 18px}
.cal-head{display:flex;align-items:center;justify-content:space-between;padding:0 2px 14px;border-bottom:1px solid var(--hairline);margin-bottom:10px}
.cal-title{font-family:var(--serif);font-size:15px;font-weight:500;letter-spacing:.06em}
.cal-nav{background:none;border:none;cursor:pointer;font-family:var(--serif);font-size:24px;color:var(--sub);padding:2px 12px;border-radius:3px;line-height:1;transition:all .2s}
.cal-nav:hover:not(:disabled){color:var(--gold);background:var(--bg2)}
.cal-nav:disabled{opacity:.22;cursor:not-allowed}
.cal-wd{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:5px}
.wd{text-align:center;font-family:var(--serif);font-size:10px;letter-spacing:.12em;color:var(--light);padding:5px 0}
.wd.sun{color:#B53A3A}.wd.sat{color:#4A6FA5}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:none;border:1px solid transparent;border-radius:4px;font-family:var(--serif);font-size:14px;color:var(--accent);cursor:pointer;transition:all .2s;padding:0}
.day.empty{pointer-events:none}
.day.off{color:var(--light);opacity:.3;cursor:not-allowed}
.day.avail{background:var(--bg2)}
.day.avail:hover{border-color:var(--gold);background:#fff}
.day.sel{background:var(--seal);color:#fff;border-color:var(--seal);font-weight:500}
.slots-wrap{margin-top:18px;border-top:1px solid var(--hairline);padding-top:16px}
.slots-l{font-family:var(--serif-ko);font-size:12.5px;color:var(--sub);margin-bottom:10px}
.slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(94px,1fr));gap:8px}
.slot{padding:12px 6px;border:1px solid var(--border);border-radius:6px;background:#fff;font-family:var(--serif-ko);font-size:14px;color:var(--accent);cursor:pointer;transition:all .2s;text-align:center}
.slot:hover{border-color:var(--gold)}
.slot.sel{background:var(--seal);color:#fff;border-color:var(--seal);font-weight:500}
.slots-none{font-family:var(--serif-ko);font-size:13px;color:var(--light);padding:6px 0}
.btn{display:block;width:100%;padding:16px;background:var(--seal);color:#fff;border:none;border-radius:6px;font-family:var(--serif-ko);font-size:15px;font-weight:500;cursor:pointer;margin-top:18px;transition:opacity .2s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{display:inline-block;margin-top:18px;color:var(--gold-deep);font-family:var(--serif-ko);font-size:13px;text-decoration:none;border-bottom:1px solid var(--border);padding-bottom:2px}
.err{color:var(--seal);font-family:var(--serif-ko);font-size:13px;text-align:center;margin-top:12px;min-height:16px;line-height:1.6}
.done{text-align:center;padding:24px 0}
.done .chk{width:54px;height:54px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;color:var(--gold);font-size:24px}
@media(max-width:560px){main{padding:24px 16px 50px}.slots{grid-template-columns:repeat(auto-fill,minmax(82px,1fr))}}
</style>
</head>
<body>
<header><div class="wm">MOMENT EDIT</div><div class="wm-sub">Private Wedding Studio</div></header>
<main>
  <div id="loading"><div class="spinner"></div></div>

  <section id="pick" hidden>
    <div class="eyebrow">Consultation</div>
    <h1>상담 일정을 선택해 주세요</h1>
    <p class="sub">원하시는 날짜와 시간을 골라 주세요.<br>가능한 날짜만 선택할 수 있어요.</p>
    <div class="card">
      <div class="cal-head">
        <button class="cal-nav" id="prev" type="button" aria-label="이전 달">‹</button>
        <span class="cal-title" id="calTitle"></span>
        <button class="cal-nav" id="next" type="button" aria-label="다음 달">›</button>
      </div>
      <div class="cal-wd"><span class="wd sun">일</span><span class="wd">월</span><span class="wd">화</span><span class="wd">수</span><span class="wd">목</span><span class="wd">금</span><span class="wd sat">토</span></div>
      <div class="cal-grid" id="grid"></div>
      <div class="slots-wrap" id="slotsWrap" hidden>
        <div class="slots-l" id="slotsL"></div>
        <div class="slots" id="slots"></div>
      </div>
    </div>
    <button class="btn" id="submit" type="button" disabled>시간을 선택해 주세요</button>
    <div class="err" id="err"></div>
  </section>

  <section id="done" hidden>
    <div class="done">
      <div class="chk">✓</div>
      <h1>일정이 신청되었어요</h1>
      <p class="sub" id="doneSub"></p>
      <a class="btn-ghost" id="toMypage" href="/mypage.html">마이페이지로 돌아가기</a>
    </div>
  </section>

  <section id="needLogin" hidden>
    <div class="done">
      <h1>로그인이 필요해요</h1>
      <p class="sub">마이페이지에서 로그인 후 다시 시도해 주세요.</p>
      <a class="btn-ghost" href="/mypage.html">마이페이지로</a>
    </div>
  </section>
</main>

<script>
(function(){
  var EXEC_URL="https://script.google.com/macros/s/AKfycbyR3n9MrPJNQfBDPDocq4VeUd8y78TtyrMTZ3a3g_eOmYwOIc6im5yXo3z1pJv7QgSBEQ/exec";
  function $(id){ return document.getElementById(id); }
  function qp(n){ try{ return new URLSearchParams(location.search).get(n)||''; }catch(e){ return ''; } }
  var token = (function(){ try{ return localStorage.getItem('me_token')||''; }catch(e){ return ''; } })() || qp('token');
  var me = qp('me');
  function api(p){ return fetch(EXEC_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(p)}).then(function(r){ return r.json(); }); }

  if(!token){ $('loading').hidden=true; $('needLogin').hidden=false; return; }

  var AV={}, FULL={}, SWD=[], SWE=[];
  var today=new Date(); today.setHours(0,0,0,0);
  var viewY=today.getFullYear(), viewM=today.getMonth();
  var WD=['일','월','화','수','목','금','토'];
  var selDate=null, selTime=null;
  function pad(n){ return (n<10?'0':'')+n; }
  function key(d){ return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }   // GAS dkey 형식(0패딩 없음)에 일치
  function fmtKo(d){ return (d.getMonth()+1)+'월 '+d.getDate()+'일 ('+WD[d.getDay()]+')'; }
  function slotsFor(d){ var arr=(d.getDay()===0||d.getDay()===6)?SWE:SWD; var taken=FULL[key(d)]||[]; return arr.filter(function(s){ return taken.indexOf(s)<0; }); }
  function dayOpen(d){ return d>=today && AV.indexOf(key(d))>=0 && slotsFor(d).length>0; }   // avail은 배열

  function renderCal(){
    $('calTitle').textContent=viewY+'년 '+(viewM+1)+'월';
    var g=$('grid'); g.innerHTML='';
    var first=new Date(viewY,viewM,1), start=first.getDay(), dim=new Date(viewY,viewM+1,0).getDate();
    for(var i=0;i<start;i++){ var e=document.createElement('span'); e.className='day empty'; g.appendChild(e); }
    for(var dd=1;dd<=dim;dd++){
      (function(){
        var cur=new Date(viewY,viewM,dd), open=dayOpen(cur);
        var b=document.createElement('button'); b.type='button'; b.textContent=dd;
        b.className='day'+(open?' avail':' off')+((selDate&&key(cur)===key(selDate))?' sel':'');
        if(open){ b.addEventListener('click',function(){ selDate=cur; selTime=null; renderCal(); renderSlots(); }); }
        g.appendChild(b);
      })();
    }
    var firstView=new Date(viewY,viewM,1), firstThis=new Date(today.getFullYear(),today.getMonth(),1);
    $('prev').disabled=(firstView<=firstThis);
  }
  function renderSlots(){
    var w=$('slotsWrap');
    if(!selDate){ w.hidden=true; return; }
    w.hidden=false;
    $('slotsL').textContent=fmtKo(selDate)+' · 시간 선택';
    var arr=slotsFor(selDate), c=$('slots'); c.innerHTML='';
    if(!arr.length){ c.innerHTML='<div class="slots-none">이 날은 예약이 찼어요. 다른 날짜를 골라 주세요.</div>'; updateBtn(); return; }
    arr.forEach(function(s){
      var b=document.createElement('button'); b.type='button'; b.className='slot'+(selTime===s?' sel':''); b.textContent=s;
      b.addEventListener('click',function(){ selTime=s; renderSlots(); updateBtn(); });
      c.appendChild(b);
    });
    updateBtn();
  }
  function updateBtn(){ var ok=!!(selDate&&selTime), btn=$('submit'); btn.disabled=!ok; btn.textContent= ok ? (fmtKo(selDate)+' '+selTime+' 으로 신청') : '시간을 선택해 주세요'; }
  function reload(){ api({action:'getAvailability', token:token}).then(function(r){ if(r&&r.ok){ AV=r.avail||[]; FULL=r.full||{}; SWD=r.slotsWeekday||[]; SWE=r.slotsWeekend||[]; selTime=null; renderCal(); renderSlots(); } }); }

  $('prev').addEventListener('click',function(){ if($('prev').disabled) return; viewM--; if(viewM<0){viewM=11;viewY--;} renderCal(); });
  $('next').addEventListener('click',function(){ viewM++; if(viewM>11){viewM=0;viewY++;} renderCal(); });
  $('submit').addEventListener('click',function(){
    if(!selDate||!selTime) return;
    var btn=$('submit'); btn.disabled=true; btn.textContent='신청 중…'; $('err').textContent='';
    api({action:'submitSchedule', token:token, dateKey:key(selDate), time:selTime}).then(function(r){
      if(r&&r.ok){ $('pick').hidden=true; $('doneSub').textContent=fmtKo(selDate)+' '+selTime+' · 디렉터 확인 후 안내드려요.'; $('done').hidden=false; if(me) setTimeout(function(){ location.href='/mypage.html'; },2200); }
      else if(r&&r.slotTaken){ $('err').textContent=(r.error||'방금 마감되었어요. 다른 시간을 골라 주세요.'); reload(); }
      else { $('err').textContent=(r&&r.error)||'신청에 실패했어요. 다시 시도해 주세요.'; updateBtn(); }
    }).catch(function(){ $('err').textContent='네트워크 오류 — 잠시 후 다시 시도해 주세요.'; updateBtn(); });
  });

  api({action:'getAvailability', token:token}).then(function(r){
    $('loading').hidden=true;
    if(r&&r.ok){
      AV=r.avail||[]; FULL=r.full||{}; SWD=r.slotsWeekday||[]; SWE=r.slotsWeekend||[];
      var best=null;   // 가용일 중 가장 이른 날의 달로 점프(문자열 정렬 대신 실제 날짜 비교)
      (AV||[]).forEach(function(k){ var p=k.split('-'); var dt=new Date(+p[0],+p[1]-1,+p[2]); dt.setHours(0,0,0,0); if(dt>=today && slotsFor(dt).length>0 && (!best||dt<best)) best=dt; });
      if(best){ viewY=best.getFullYear(); viewM=best.getMonth(); }
      $('pick').hidden=false; renderCal();
    } else if(r && (r.reason==='expired' || /로그인/.test(r.error||''))){ $('needLogin').hidden=false; }
    else { $('pick').hidden=false; renderCal(); $('err').textContent=(r&&r.error)||'일정을 불러오지 못했어요.'; }
  }).catch(function(){ $('loading').hidden=true; $('pick').hidden=false; renderCal(); $('err').textContent='불러오기 실패 — 새로고침 해주세요.'; });
})();
</script>
</body>
</html>
