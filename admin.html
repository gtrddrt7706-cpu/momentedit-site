<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<base target="_top">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Moment Edit · 관리자</title>
<!-- 홈 화면 아이콘(본 로고) — 희준 PC: 본인 admin_icon_base64.txt 내용으로 교체 가능 -->
<link rel="apple-touch-icon" href="/shared/admin-icon.png">
<link rel="icon" type="image/png" href="/shared/admin-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Moment Edit · 관리자">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+KR:wght@300;400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --paper:#FAFAF8;--paper2:#F5F3EF;--paper3:#EDEBE6;--card:#FFFFFF;
  --ink:#1C1B19;--sub:#5A554C;--light:#75705F;--accent:#3A2D22;
  --gold:#B89A75;--gold-deep:#9A7B4F;--gold-deeper:#7A5F37;--gold-line:#E6E1D8;
  --seal:#6B2A24;--border:#DDD8D1;--divider:#EDEAE4;--label-soft:#7C766A;
  --blue:#3F6F7A;--red:#9A4A45;--redbg:#F2EDED;--yellow:#8A6A2B;--yellowbg:#FBF3E4;
  --serif:'Cormorant Garamond',Georgia,serif;--serif-ko:'Noto Serif KR',serif;
  --sans:'Noto Sans KR',-apple-system,sans-serif;--mono:'Roboto Mono',monospace;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-weight:300;font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;word-break:keep-all;min-height:100vh}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}

/* 헤더 */
.topbar{position:sticky;top:0;z-index:20;background:rgba(250,250,248,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--gold-line);padding:12px 16px;display:flex;align-items:center;gap:8px}
.topbar .wm{font-family:var(--serif);font-size:13px;font-weight:600;letter-spacing:.22em;color:var(--accent)}
.topbar .who{margin-left:auto;font-family:var(--serif-ko);font-size:12px;color:var(--sub)}
.topbar .tb{background:none;border:1px solid var(--border);border-radius:7px;min-width:34px;height:34px;cursor:pointer;color:var(--gold-deeper);font-size:13px;flex:none;padding:0 9px}
.topbar .tb:active{background:var(--paper2)}
main{max-width:580px;margin:0 auto;padding:14px 14px 64px}

/* 검색 */
.search{display:flex;gap:8px;margin-bottom:16px}
.search input{flex:1;border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-family:var(--sans);font-size:16px;color:var(--accent);background:#fff;outline:none}
.search input:focus{border-color:var(--gold)}
.search button{flex:none;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0 16px;font-family:var(--serif-ko);font-size:13px;cursor:pointer}

/* 섹션 제목 */
.sect-h{display:flex;align-items:center;gap:8px;margin:22px 2px 11px}
.sect-h .ic{font-size:15px}
.sect-h .tt{font-family:var(--serif-ko);font-size:15px;font-weight:600;color:var(--accent)}
.sect-h .ct{margin-left:auto;font-family:var(--mono);font-size:11.5px;color:var(--light)}
.sect-h .ct b{color:var(--seal)}

/* 처리할 일 묶음 */
.qhead{font-family:var(--serif-ko);font-size:12px;font-weight:500;color:var(--label-soft);margin:14px 2px 7px;letter-spacing:.02em}
.qhead.red{color:var(--seal)}
.qrow{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:border-color .2s}
.qrow:active{border-color:var(--gold)}
.qrow.red{border-color:rgba(154,74,69,.4);background:rgba(154,74,69,.025)}
.qrow .ql{flex:1;min-width:0}
.qrow .qn{font-family:var(--serif-ko);font-size:14.5px;font-weight:500;color:var(--accent);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.qrow .qk{font-family:var(--serif-ko);font-size:11px;color:var(--gold-deeper);border:1px solid var(--gold-line);border-radius:9px;padding:1px 7px;flex:none}
.qrow .qs{font-family:var(--serif-ko);font-size:12px;color:var(--light);margin-top:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.qbadge{font-family:var(--serif-ko);font-size:10.5px;font-weight:500;border-radius:9px;padding:1px 8px;flex:none}
.qbadge.red{background:var(--redbg);color:var(--red)}
.qbadge.yellow{background:var(--yellowbg);color:var(--yellow)}
.qbtn{flex:none;background:var(--seal);color:#fff;border:none;border-radius:8px;padding:9px 13px;font-family:var(--serif-ko);font-size:12.5px;font-weight:500;cursor:pointer;min-height:38px}
.qbtn.go{background:#fff;border:1px solid var(--gold-deep);color:var(--gold-deeper)}
.qbtn:active{opacity:.85}

/* 진행 중 현황 */
.ptabs{display:flex;gap:6px;margin:0 0 12px}
.ptab{flex:1;text-align:center;border:1px solid var(--border);border-radius:8px;padding:8px 4px;font-family:var(--serif-ko);font-size:12.5px;color:var(--sub);background:#fff;cursor:pointer}
.ptab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.ptab .pc{font-family:var(--mono);font-size:10.5px;opacity:.75;margin-left:3px}
.psub{font-family:var(--serif);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);margin:14px 2px 7px}
.pgroup{margin-bottom:7px}
.pghead{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid var(--border);border-radius:9px;background:#fff;cursor:pointer}
.pghead.dim{opacity:.5;cursor:default}
.pgname{font-family:var(--serif-ko);font-size:13px;font-weight:500;border-radius:9px;padding:2px 10px}
.pgn{font-family:var(--mono);font-size:11.5px;color:var(--light)}
.pgdot{color:var(--seal);font-size:10px}
.pgcar{margin-left:auto;color:var(--label-soft);font-size:12px;transition:transform .2s}
.pgroup.open .pgcar{transform:rotate(90deg)}
.pgbody{display:none;padding:5px 4px 4px}
.pgroup.open .pgbody{display:block}
.pcust{display:flex;align-items:center;gap:8px;padding:9px 11px;border-bottom:1px solid var(--divider);cursor:pointer}
.pcust:last-child{border-bottom:none}
.pcust .cn{font-family:var(--serif-ko);font-size:13.5px;color:var(--accent);flex:none}
.pcust .cs{font-family:var(--serif-ko);font-size:11.5px;color:var(--light);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcust .cd{font-family:var(--mono);font-size:10.5px;color:var(--blue);flex:none}
.pcust .bolt{color:var(--seal);flex:none;font-size:12px}

.empty{font-family:var(--serif-ko);font-size:13px;color:var(--label-soft);text-align:center;padding:26px 0}
.hint{font-family:var(--serif-ko);font-size:12px;color:var(--gold-deeper);text-align:center;padding:6px 0}

/* 상세 */
.back{display:inline-flex;align-items:center;gap:6px;font-family:var(--serif-ko);font-size:13px;color:var(--sub);background:none;border:none;cursor:pointer;margin-bottom:10px;padding:4px 0}
.dsticky{position:sticky;top:46px;z-index:9;background:rgba(250,250,248,.96);backdrop-filter:blur(8px);margin:0 -14px 12px;padding:8px 14px;border-bottom:1px solid var(--gold-line);display:flex;align-items:center;gap:8px}
.dsticky .nm{font-family:var(--serif-ko);font-size:15px;font-weight:600;color:var(--accent)}
.dsticky .stage{font-family:var(--serif-ko);font-size:11px;border-radius:10px;padding:2px 10px}
.dhead{margin-bottom:12px}
.dhead .pin{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-family:var(--serif-ko);font-size:12px;color:var(--sub)}
.dhead .pin .pchip{background:var(--paper2);border-radius:8px;padding:3px 9px}
.dhead .code{font-family:var(--mono);font-size:10.5px;color:var(--label-soft)}
.contact{display:flex;gap:8px;margin:10px 0 16px}
.contact a,.contact button{flex:1;text-align:center;border:1px solid var(--border);border-radius:8px;padding:10px;font-family:var(--serif-ko);font-size:13px;color:var(--accent);text-decoration:none;background:#fff;cursor:pointer}
.contact a:active,.contact button:active{background:var(--paper2)}

.fields-toggle{font-family:var(--serif-ko);font-size:12.5px;color:var(--gold-deeper);background:var(--paper2);border:1px solid var(--gold-line);border-radius:8px;padding:10px 12px;cursor:pointer;width:100%;text-align:left;margin-bottom:12px}
.fields{display:none;background:#fff;border:1px solid var(--border);border-radius:9px;padding:6px 14px;margin-bottom:12px}
.fields.open{display:block}
.grp-l{font-family:var(--serif);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-deep);margin:10px 0 4px}
.fld{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--divider);font-size:12.5px}
.fld:last-child{border-bottom:none}
.fld .k{flex:none;width:84px;font-family:var(--serif-ko);color:var(--label-soft)}
.fld .v{flex:1;font-family:var(--serif-ko);color:var(--ink);line-height:1.6;white-space:pre-wrap}
.fld .v a{color:var(--blue)}

/* 카드 */
.card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:15px;margin-bottom:11px}
.card.cur{border-left:3px solid var(--seal)}
.card.dim{opacity:.6}
.card-h{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.card-h .ct{font-family:var(--serif-ko);font-size:13.5px;font-weight:600;color:var(--accent)}
.card-h .cflag{margin-left:auto;font-family:var(--serif-ko);font-size:10.5px;border-radius:9px;padding:2px 9px}
.raw{font-family:var(--serif-ko);font-size:12.5px;color:var(--sub);background:var(--paper2);border-radius:7px;padding:8px 11px;line-height:1.7;word-break:break-all}
.raw b{color:var(--accent);font-weight:500}
.mt{font-family:var(--serif-ko);font-size:11.5px;color:var(--gold-deeper);background:none;border:none;cursor:pointer;padding:7px 0 2px}
.mbody{display:none;margin-top:6px;border-top:1px dashed var(--gold-line);padding-top:8px}
.mbody.open{display:block}
.kv{display:flex;gap:10px;padding:5px 0;font-size:12px}
.kv .k{flex:none;width:92px;font-family:var(--serif-ko);color:var(--label-soft)}
.kv .v{flex:1;font-family:var(--serif-ko);color:var(--ink);word-break:break-all}
.cnote{font-family:var(--serif-ko);font-size:11.5px;color:var(--light);margin-top:7px}
.link-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--serif-ko);font-size:12px;color:var(--blue);margin-right:8px}
.res-sel{margin-top:8px;padding-top:8px;border-top:1px dashed var(--line,#E5E0D8)}
.res-sel-list{margin-top:4px;font-size:12px;color:var(--ink,#3A332B);background:#fff;border:1px solid var(--line,#E5E0D8);border-radius:6px;padding:7px 9px;max-height:120px;overflow:auto;white-space:pre-wrap;word-break:break-word}
.res-ex{margin-top:6px;font-size:12.5px;color:var(--sub)}

/* 메모·이력 */
.memo-area{width:100%;border:1px solid var(--border);border-radius:8px;padding:11px;font-family:var(--sans);font-size:14px;color:var(--accent);background:#fff;resize:vertical;min-height:62px;outline:none;line-height:1.6}
.memo-area:focus{border-color:var(--gold)}
.hist{font-family:var(--mono);font-size:11px;color:var(--sub);line-height:1.8;max-height:160px;overflow-y:auto;background:var(--paper2);border-radius:7px;padding:9px 11px}
.hist .hl{border-bottom:1px solid var(--divider);padding:2px 0}
.hist .hl:last-child{border-bottom:none}

/* 버튼 */
.actions{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.btn{display:block;width:100%;text-align:center;padding:13px 0;border:none;border-radius:8px;font-family:var(--serif-ko);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;min-height:46px}
.btn-seal{background:var(--seal);color:#fff}
.btn-seal:active{background:#5A231E}
.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--sub)}
.btn-ghost:active{background:var(--paper2)}
.btn-line{background:#fff;border:1px solid var(--gold-deep);color:var(--gold-deeper)}
.btn-danger{background:#fff;border:1px solid var(--red);color:var(--red)}
.btn-sm{padding:9px 0;font-size:12.5px;min-height:40px}
.gate{font-family:var(--serif-ko);font-size:11.5px;color:var(--label-soft);text-align:center;padding:8px 0}

/* 고급 */
.adv{margin-top:18px}
.adv-t{font-family:var(--serif-ko);font-size:12.5px;color:var(--label-soft);background:none;border:none;cursor:pointer;padding:8px 0;width:100%;text-align:left}
.adv-body{display:none;background:#fff;border:1px solid var(--red);border-radius:10px;padding:14px;margin-top:6px}
.adv-body.open{display:block}
.adv-warn{font-family:var(--serif-ko);font-size:11.5px;color:var(--red);background:var(--redbg);border-radius:7px;padding:8px 11px;margin-bottom:11px;line-height:1.6}
.adv-body label{display:block;font-family:var(--serif-ko);font-size:11px;color:var(--label-soft);margin:8px 0 4px}
.adv-body select,.adv-body input{width:100%;box-sizing:border-box;border:1px solid var(--border);border-radius:7px;padding:11px;font-family:var(--sans);font-size:16px;color:var(--accent);background:#fff;outline:none;-webkit-appearance:none;appearance:none;min-height:46px}

/* 아카이브 */
.achips{display:flex;gap:6px;margin-bottom:14px}
.achip{flex:1;text-align:center;border:1px solid var(--border);border-radius:8px;padding:8px 4px;font-family:var(--serif-ko);font-size:12px;color:var(--sub);background:#fff;cursor:pointer}
.achip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.arow{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:9px;cursor:pointer}
.arow .an{font-family:var(--serif-ko);font-size:13.5px;color:var(--accent);flex:1;min-width:0}
.arow .ad{font-family:var(--mono);font-size:10px;color:var(--light);flex:none}
.endchip{font-family:var(--serif-ko);font-size:10.5px;border-radius:9px;padding:2px 9px;flex:none}
.endchip.done{background:#E3EFE6;color:#1F6B3A}
.endchip.stopped{background:var(--redbg);color:var(--red)}

/* 로딩·스켈레톤·토스트 */
#loading{text-align:center;padding:54px 0;color:var(--light);font-family:var(--serif-ko);font-size:13px}
.spinner{width:26px;height:26px;border:2px solid var(--gold-line);border-top-color:var(--seal);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.skel{background:linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%);background-size:200% 100%;animation:sk 1.2s infinite;border-radius:9px;height:54px;margin-bottom:8px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#fff;font-family:var(--serif-ko);font-size:13px;padding:11px 20px;border-radius:24px;opacity:0;transition:all .3s var(--ease);z-index:60;pointer-events:none;max-width:90%;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 모달 */
.modal-ov{position:fixed;inset:0;background:rgba(28,27,25,.5);display:none;align-items:center;justify-content:center;padding:24px;z-index:50;overflow-y:auto}
.modal-ov.show{display:flex}
.modal{background:#fff;border-radius:12px;max-width:390px;width:100%;padding:24px 22px;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.modal h3{font-family:var(--serif-ko);font-size:16.5px;font-weight:600;color:var(--accent);text-align:center;margin-bottom:9px}
.modal .mbody-t{font-family:var(--serif-ko);font-size:13px;color:var(--sub);text-align:center;line-height:1.7;margin-bottom:14px}
.modal .mbody-t .li{display:block;font-size:12px;color:var(--light);margin-top:3px}
.modal.danger h3{color:var(--seal)}
.modal .field{margin-bottom:11px}
.modal label{display:block;font-family:var(--serif-ko);font-size:11px;color:var(--label-soft);margin-bottom:5px}
.modal input,.modal select,.modal textarea{width:100%;box-sizing:border-box;border:1px solid var(--border);border-radius:7px;padding:12px 13px;font-family:var(--sans);font-size:16px;color:var(--accent);background:#fff;outline:none;-webkit-appearance:none;appearance:none;min-height:48px}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--gold)}
.modal .mbtns{display:flex;gap:8px;margin-top:6px}
.modal .mbtns .btn{flex:1}
.modal .merr{font-family:var(--serif-ko);font-size:12px;color:var(--seal);text-align:center;min-height:15px;margin-bottom:5px}

/* 로그인 */
.login-wrap{max-width:340px;margin:9vh auto 0;text-align:center;padding:0 6px}
.login-logo{width:74px;height:74px;border-radius:18px;margin:0 auto 14px;background:#F3ECDF;border:1px solid var(--gold-line);display:flex;align-items:center;justify-content:center;font-family:var(--serif-ko);font-size:42px;font-weight:500;color:var(--seal)}
.login-t{font-family:var(--serif);font-size:13px;letter-spacing:.22em;color:var(--accent);margin-bottom:28px}
.login-wrap .field{text-align:left;margin-bottom:12px}
.login-wrap label{display:block;font-family:var(--serif-ko);font-size:11px;color:var(--label-soft);margin-bottom:5px}
.login-wrap input{width:100%;box-sizing:border-box;border:1px solid var(--border);border-radius:8px;padding:13px;font-family:var(--sans);font-size:16px;color:var(--accent);background:#fff;outline:none;min-height:50px}
.login-wrap input:focus{border-color:var(--gold)}
.login-err{font-family:var(--serif-ko);font-size:12px;color:var(--seal);min-height:16px;margin:4px 0 10px}
.login-wrap .btn{margin-top:4px}
</style>
</head>
<body>

<div class="topbar">
  <span class="wm">MOMENT EDIT</span>
  <span class="who" id="whoName"></span>
  <button class="tb" id="btnArchive" title="아카이브" style="display:none">🗄</button>
  <button class="tb" id="btnRefresh" title="새로고침" style="display:none">↻</button>
  <button class="tb" id="btnLogout" title="로그아웃" style="display:none">⏏</button>
</div>

<main>
  <div id="loading"><div class="spinner"></div>불러오는 중…</div>

  <!-- 로그인 -->
  <section id="loginView" style="display:none">
    <div class="login-wrap">
      <div class="login-t">MOMENT EDIT · 관리자</div>
      <div class="field"><label>아이디</label><input type="text" id="lgId" autocomplete="username" autocapitalize="off" autocorrect="off" spellcheck="false"></div>
      <div class="field"><label>비밀번호</label><input type="password" id="lgPw" autocomplete="current-password"></div>
      <div class="login-err" id="lgErr"></div>
      <button class="btn btn-seal" id="lgBtn">로그인</button>
    </div>
  </section>

  <!-- 홈: 처리할 일 + 현황 -->
  <section id="homeView" style="display:none">
    <div class="search">
      <input type="text" id="q" placeholder="개인코드·이름·연락처 검색" autocomplete="off">
      <button id="btnSearch">검색</button>
    </div>
    <div id="queueWrap"></div>
    <div id="pipeWrap"></div>
  </section>

  <!-- 상세 -->
  <section id="detailView" style="display:none">
    <button class="back" id="btnBack">← 목록</button>
    <div id="detailBody"></div>
  </section>

  <!-- 아카이브 -->
  <section id="archiveView" style="display:none">
    <button class="back" id="btnArcBack">← 목록</button>
    <div class="sect-h"><span class="ic">🗄</span><span class="tt">아카이브 (끝난 고객)</span></div>
    <div class="search">
      <input type="text" id="aq" placeholder="이름·개인코드·연락처 검색" autocomplete="off">
      <button id="btnAsearch">검색</button>
    </div>
    <div class="achips" id="aChips"></div>
    <div id="archiveBody"></div>
  </section>
</main>

<div id="toast"></div>

<div class="modal-ov" id="confirmModal">

<script>
var TOKEN = localStorage.getItem('me_admin_token') || '';
var EXEC_URL = "https://script.google.com/macros/s/AKfycbyR3n9MrPJNQfBDPDocq4VeUd8y78TtyrMTZ3a3g_eOmYwOIc6im5yXo3z1pJv7QgSBEQ/exec";
var SLOTS = { weekday: [], weekend: [] };
var curDetail = null;
var _view = 'home';        // home | detail | archive
var _origin = 'home';      // 상세 진입 출처(came-from): home | search | archive
var _lastQuery = '';
var _arcQuery = '', _arcFilter = 'all';
var FILTER_KEY = 'me_admin_filter', OPEN_KEY = 'me_admin_open';

/* 상수 — 백엔드 config와 일치 */
var STAGE_FLOW = {
  '시그니처': ['신청접수','상담확정','시착','상담완료','계약완료','입금완료','제작중','예식완료','결과물전달'],
  '웨딩스냅': ['신청접수','촬영확정','계약완료','입금완료','촬영완료','결과물전달']
};
var STAGE_EX = ['미계약','취소','노쇼'];
var STAGE_COLOR = {
  '신청접수':['#FBF1E6','#8A5A2B'],
  '상담확정':['#EAF0F6','#2B5A8A'],'촬영확정':['#EAF0F6','#2B5A8A'],'시착':['#EAF0F6','#2B5A8A'],'상담완료':['#EAF0F6','#2B5A8A'],
  '계약완료':['#E7F1EA','#2E6B43'],
  '입금완료':['#E3EFE6','#1F6B3A'],'예식완료':['#E3EFE6','#1F6B3A'],'촬영완료':['#E3EFE6','#1F6B3A'],'결과물전달':['#E3EFE6','#1F6B3A'],
  '제작중':['#F1EEF6','#5A4B8A'],
  '미계약':[ '#F2EDED','#9A4A45'],'취소':['#F2EDED','#9A4A45'],'노쇼':['#F2EDED','#9A4A45']
};
var DESIGNS = {'01':'클래식','02':'에디토리얼','03':'레터프레스','04':'버밀리언','05':'보태니컬','06':'한글','07':'아키텍트','08':'누아르'};
var WD = ['일','월','화','수','목','금','토'];

function $(id){ return document.getElementById(id); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];}); }
function toast(msg){ var t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },2200); }
function show(view){
  _view = (view==='detail'||view==='archive') ? view : (view==='login'?'login':'home');
  $('loading').style.display = (view==='loading')?'block':'none';
  $('loginView').style.display = (view==='login')?'block':'none';
  $('homeView').style.display = (view==='home')?'block':'none';
  $('detailView').style.display = (view==='detail')?'block':'none';
  $('archiveView').style.display = (view==='archive')?'block':'none';
}
// momentedit.kr 호스팅 — GAS를 fetch(doPost)로 호출 (마이페이지와 동일·CORS preflight 회피)
function api(payload){
  return fetch(EXEC_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload) }).then(function(r){ return r.json(); });
}
function gas(fn){ var args = Array.prototype.slice.call(arguments,1); return api({ action:'adminCall', token:TOKEN, fn:fn, args:args }); }
function gasRaw(fn){
  var args = Array.prototype.slice.call(arguments,1);
  if(fn==='adminLogin')  return api({ action:'adminLogin',  id:args[0], pw:args[1] });
  if(fn==='adminLogout') return api({ action:'adminLogout', token:args[0] });
  return api({ action:fn });
}
function snap(p){ return p==='웨딩스냅'; }
function prodLabel(p){ return snap(p)?'스냅':'시그'; }

/* 시각 표기 — "YYYY-MM-DD HH:mm" → "M/D HH:mm"(올해 연도 생략) */
function fmtDT(s){ var m=String(s||'').match(/(\d{4})-(\d{1,2})-(\d{1,2})[ T](\d{1,2}):(\d{2})/); if(!m) return esc(s||''); var yr=(+m[1]!==new Date().getFullYear())?(m[1]+'/'):''; return yr+(+m[2])+'/'+(+m[3])+' '+m[4]+':'+m[5]; }
function fmtDate(ymd){ var m=String(ymd||'').match(/(\d{4})-(\d{1,2})-(\d{1,2})/); if(!m) return esc(ymd||''); var d=new Date(+m[1],+m[2]-1,+m[3]); return (+m[2])+'/'+(+m[3])+'('+WD[d.getDay()]+')'; }
function ddayLabel(n,isSnap){ if(n==null) return ''; var w=isSnap?'촬영':'예식'; if(n>0) return w+' D-'+n; if(n<0) return w+' D+'+(-n); return w+' D-day'; }
function stageStyle(s){ var c=STAGE_COLOR[s]||['#EEE','#555']; return 'background:'+c[0]+';color:'+c[1]; }
function designLabel(v){ var n=('0'+String(v||'').replace(/[^0-9]/g,'')).slice(-2); return DESIGNS[n]?(n+' '+DESIGNS[n]):(v?('디자인 '+n):''); }

/* 복사(피드백) — mypage invCopy 패턴 */
function copyText(text,btn){
  function done(){ if(btn){ var t=btn.getAttribute('data-lbl')||btn.textContent; btn.setAttribute('data-lbl',t); btn.textContent='복사됨'; setTimeout(function(){ btn.textContent=t; },1400); } }
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(done).catch(function(){ legacyCopy(text); done(); }); }
  else { legacyCopy(text); done(); }
}
function legacyCopy(t){ try{ var ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);}catch(e){} }

/* ── 부팅 ── */
if(TOKEN) loadHome(); else showLogin();
$('lgBtn').addEventListener('click', doLogin);
$('lgPw').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
$('lgId').addEventListener('keydown', function(e){ if(e.key==='Enter'){ var p=$('lgPw'); if(p) p.focus(); } });
$('btnLogout').addEventListener('click', doLogout);
$('btnRefresh').addEventListener('click', loadHome);
$('btnArchive').addEventListener('click', function(){ openArchive(); });
$('btnBack').addEventListener('click', goBack);
$('btnArcBack').addEventListener('click', loadHome);
$('btnSearch').addEventListener('click', doSearch);
$('q').addEventListener('keydown', function(e){ if(e.key==='Enter') doSearch(); });
$('btnAsearch').addEventListener('click', function(){ _arcQuery=$('aq').value.trim(); loadArchive(); });
$('aq').addEventListener('keydown', function(e){ if(e.key==='Enter'){ _arcQuery=$('aq').value.trim(); loadArchive(); } });
function goBack(){ if(_origin==='archive'){ openArchive(); } else if(_origin==='search'&&_lastQuery){ $('q').value=_lastQuery; doSearch(); } else { loadHome(); } }

/* ── 로그인·세션 ── */
function setWho(n){ var e=$('whoName'); if(e) e.textContent=n?(esc(n)+'님'):''; }
function setTopbar(on){ ['btnArchive','btnRefresh','btnLogout'].forEach(function(id){ var e=$(id); if(e) e.style.display=on?'':'none'; }); if(!on) setWho(''); }
function showLogin(){ setTopbar(false); show('login'); setTimeout(function(){ var x=$('lgId'); if(x) x.focus(); }, 80); }
function authFail(msg){ TOKEN=''; localStorage.removeItem('me_admin_token'); showLogin(); var le=$('lgErr'); if(le) le.textContent = msg || '세션이 만료되었어요. 다시 로그인해 주세요.'; }
function doLogin(){
  var id=$('lgId').value.trim(), pw=$('lgPw').value;
  if(!id||!pw){ $('lgErr').textContent='아이디·비밀번호를 입력해 주세요.'; return; }
  $('lgBtn').disabled=true; $('lgBtn').textContent='로그인 중…'; $('lgErr').textContent='';
  gasRaw('adminLogin', id, pw).then(function(r){
    $('lgBtn').disabled=false; $('lgBtn').textContent='로그인';
    if(r&&r.ok){ TOKEN=r.token; localStorage.setItem('me_admin_token',TOKEN); $('lgPw').value=''; setWho(r.name); setTopbar(true); loadHome(); }
    else { $('lgErr').textContent=(r&&r.error)||'로그인 실패'; }
  }).catch(function(e){ $('lgBtn').disabled=false; $('lgBtn').textContent='로그인'; $('lgErr').textContent='오류: '+(e&&e.message||e); });
}
function doLogout(){ try{ gasRaw('adminLogout', TOKEN); }catch(e){} TOKEN=''; localStorage.removeItem('me_admin_token'); setTopbar(false); showLogin(); }

/* ════════ 홈 ════════ */
function loadHome(){
  _lastQuery=''; _origin='home';
  $('loading').innerHTML='<div class="skel"></div><div class="skel"></div><div class="skel" style="height:40px"></div>';
  show('loading');
  gas('adminHome').then(function(d){
    if(!d||!d.ok){ authFail(); return; }
    setWho(d.name); setTopbar(true);
    curHome=d; renderQueue(d); renderPipeline(d); show('home');
  }).catch(function(e){ authFail(); });
}
var curHome=null;

function queueRow(it){
  var inlineKinds={ '신규신청':'approve','시착보내기':'openFitting','상담완료':'consultDone','입금확인':'confirmPay','예식완료':'eventDone','촬영완료':'eventDone','결과물전달':'delivered' };
  var act=inlineKinds[it.kind];
  var btnLbl={ '신규신청':'✓ 승인','시착보내기':'시착 동의 보내기','상담완료':'상담완료','입금확인':'입금 확인','예식완료':'예식완료','촬영완료':'촬영완료','결과물전달':'결과물 전달','계약발송':'계약서 발송','결과물등록':'결과물 등록','계약만료':'재발송' }[it.kind]||'처리';
  var badge=it.badge?('<span class="qbadge '+esc(it.badge.level)+'">'+esc(it.badge.text)+'</span>'):'';
  var btn = act
    ? '<button class="qbtn" data-act="'+esc(act)+'" data-code="'+esc(it.code)+'" data-names="'+esc(it.names)+'" data-snap="'+(snap(it.product)?'1':'0')+'">'+esc(btnLbl)+'</button>'
    : '<button class="qbtn go" data-go="'+esc(it.code)+'">'+esc(btnLbl)+' ›</button>';
  return '<div class="qrow'+(it.badge&&it.badge.level==='red'?' red':'')+'" data-code="'+esc(it.code)+'">'+
    '<div class="ql"><div class="qn"><span class="qk">'+esc(it.kind)+'</span>'+esc(it.names)+' <span style="font-size:10px;color:var(--label-soft)">'+esc(prodLabel(it.product))+'</span></div>'+
    '<div class="qs">'+esc(it.sub||'')+badge+'</div></div>'+btn+'</div>';
}
function renderQueue(d){
  var u=d.queue.urgent||[], n=d.queue.normal||[], html='';
  html+='<div class="sect-h"><span class="ic">⚡</span><span class="tt">처리할 일</span><span class="ct">'+(d.counts.total)+(d.counts.urgent?' · <b>🔴'+d.counts.urgent+' 급함</b>':'')+'</span></div>';
  if(!d.counts.total){
    html+='<div class="empty">✓ 처리할 일이 없어요 — 다 됐어요</div>';
  } else {
    if(u.length){ html+='<div class="qhead red">🔴 급한 것 ('+u.length+')</div>'+u.map(queueRow).join(''); }
    if(n.length){ html+='<div class="qhead">그 외 ('+n.length+')</div>'+n.map(queueRow).join(''); }
  }
  $('queueWrap').innerHTML=html;
  // 바인딩: 행→상세 / 인라인 버튼→액션 / go 버튼→상세
  $('queueWrap').querySelectorAll('.qrow').forEach(function(el){ el.addEventListener('click', function(){ openDetail(el.getAttribute('data-code'),'home'); }); });
  $('queueWrap').querySelectorAll('.qbtn[data-go]').forEach(function(b){ b.addEventListener('click', function(e){ e.stopPropagation(); openDetail(b.getAttribute('data-go'),'home'); }); });
  $('queueWrap').querySelectorAll('.qbtn[data-act]').forEach(function(b){ b.addEventListener('click', function(e){ e.stopPropagation(); onQueueAct(b.getAttribute('data-act'), b.getAttribute('data-code'), b.getAttribute('data-names'), b.getAttribute('data-snap')==='1'); }); });
}
function onQueueAct(act,code,names,isSnap){
  if(act==='approve') doApprove(code,names);
  else if(act==='consultDone') doConsultDone(code,names);
  else if(act==='confirmPay') doConfirmPay(code,names);
  else if(act==='eventDone') doEventDone(code,names,isSnap);
  else if(act==='delivered') doDelivered(code,names);
  else if(act==='openFitting') doOpenFitting(code,names);
}

function renderPipeline(d){
  var filter=localStorage.getItem(FILTER_KEY)||'시그니처';
  var pc=d.pipeCounts||{}, html='';
  html+='<div class="sect-h"><span class="ic">📊</span><span class="tt">진행 중 현황</span></div>';
  html+='<div class="ptabs">'+
    tabBtn('시그니처','시그니처 ',pc['시그니처'],filter)+
    tabBtn('웨딩스냅','스냅 ',pc['웨딩스냅'],filter)+
    tabBtn('전체','전체 ',(pc['시그니처']||0)+(pc['웨딩스냅']||0),filter)+'</div>';
  html+='<div id="pipeBody"></div>';
  $('pipeWrap').innerHTML=html;
  $('pipeWrap').querySelectorAll('.ptab').forEach(function(t){ t.addEventListener('click', function(){ localStorage.setItem(FILTER_KEY,t.getAttribute('data-f')); renderPipeline(curHome); }); });
  renderPipeBody(d, filter);
}
function tabBtn(f,label,n,cur){ return '<div class="ptab'+(cur===f?' active':'')+'" data-f="'+f+'">'+esc(label)+'<span class="pc">'+(n||0)+'</span></div>'; }
function renderPipeBody(d, filter){
  var html='';
  if(filter==='전체'){
    html+='<div class="psub">시그니처</div>'+pipeSection(d.pipeline['시그니처'],'시그니처');
    html+='<div class="psub">웨딩스냅</div>'+pipeSection(d.pipeline['웨딩스냅'],'웨딩스냅');
  } else {
    html+=pipeSection(d.pipeline[filter], filter);
  }
  $('pipeBody').innerHTML=html;
  bindPipe();
}
function pipeSection(groups, product){
  groups=groups||[];
  var hasAny=groups.some(function(g){return g.count>0;});
  if(!hasAny) return '<div class="empty">진행 중인 '+(product==='웨딩스냅'?'웨딩스냅 ':'')+'고객이 없어요</div>';
  var open=getOpen();
  return groups.map(function(g){
    var isSnap=snap(product);
    if(!g.count) return '<div class="pgroup"><div class="pghead dim"><span class="pgname" style="'+stageStyle(g.stage)+'">'+esc(g.stage)+'</span><span class="pgn">0</span></div></div>';
    var key=product+':'+g.stage, isOpen=open.indexOf(key)!==-1;
    var cust=g.customers.map(function(c){
      return '<div class="pcust" data-code="'+esc(c.code)+'"><span class="cn">'+esc(c.names)+'</span>'+
        '<span class="cs">'+esc(c.sub||'')+'</span>'+
        (c.dday!=null?'<span class="cd">'+esc(ddayLabel(c.dday,isSnap))+'</span>':'')+
        (c.flag?'<span class="bolt">⚡</span>':'')+'</div>';
    }).join('');
    return '<div class="pgroup'+(isOpen?' open':'')+'" data-key="'+esc(key)+'">'+
      '<div class="pghead"><span class="pgname" style="'+stageStyle(g.stage)+'">'+esc(g.stage)+'</span><span class="pgn">'+g.count+'</span>'+(g.hasUrgent?'<span class="pgdot">🔴</span>':'')+'<span class="pgcar">›</span></div>'+
      '<div class="pgbody">'+cust+'</div></div>';
  }).join('');
}
function bindPipe(){
  $('pipeBody').querySelectorAll('.pghead:not(.dim)').forEach(function(h){ h.addEventListener('click', function(){ var g=h.parentNode; g.classList.toggle('open'); toggleOpen(g.getAttribute('data-key'), g.classList.contains('open')); }); });
  $('pipeBody').querySelectorAll('.pcust').forEach(function(c){ c.addEventListener('click', function(){ openDetail(c.getAttribute('data-code'),'home'); }); });
}
function getOpen(){ try{ return JSON.parse(localStorage.getItem(OPEN_KEY)||'[]'); }catch(e){ return []; } }
function toggleOpen(key,on){ var a=getOpen(); var i=a.indexOf(key); if(on&&i===-1)a.push(key); if(!on&&i!==-1)a.splice(i,1); localStorage.setItem(OPEN_KEY,JSON.stringify(a)); }

/* ════════ 검색 ════════ */
function doSearch(){
  var q=$('q').value.trim();
  if(!q){ loadHome(); return; }
  _lastQuery=q;
  show('loading'); $('loading').innerHTML='<div class="spinner"></div>검색 중…';
  gas('adminSearch', q).then(function(d){
    if(!d||!d.ok){ toast('검색 실패'); show('home'); return; }
    var html='<div class="sect-h"><span class="tt">검색 결과</span><span class="ct">'+d.results.length+'</span></div>';
    if(!d.results.length) html+='<div class="empty">\''+esc(q)+'\' 결과가 없어요</div>';
    else html+=d.results.map(function(it){
      return '<div class="qrow" data-code="'+esc(it.code)+'"><div class="ql"><div class="qn">'+esc(it.names)+' <span style="font-size:10px;color:var(--label-soft)">'+esc(prodLabel(it.product))+'</span></div><div class="qs">'+esc(it.stage||'')+' · '+esc(it.code)+'</div></div><span style="color:var(--label-soft)">›</span></div>';
    }).join('');
    $('queueWrap').innerHTML=html; $('pipeWrap').innerHTML='';
    $('queueWrap').querySelectorAll('.qrow').forEach(function(el){ el.addEventListener('click', function(){ openDetail(el.getAttribute('data-code'),'search'); }); });
    show('home');
  }).catch(function(){ toast('검색 오류'); show('home'); });
}

/* ════════ 상세 ════════ */
function openDetail(code, origin){
  if(origin) _origin=origin;
  show('loading'); $('loading').innerHTML='<div class="skel" style="height:40px"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div>';
  gas('adminDetail', code).then(function(d){
    if(!d||!d.ok){ toast(d&&d.error||'불러오기 실패'); loadHome(); return; }
    curDetail=d; renderDetail(d); show('detail'); window.scrollTo(0,0);
  }).catch(function(e){ toast('오류'); loadHome(); });
}

function renderDetail(d){
  var isSnap=snap(d.product), c=d.consult, h='';
  // sticky 헤더
  h+='<div class="dsticky"><span class="nm">'+esc(d.names)+'</span><span class="stage" style="'+stageStyle(d.stage)+'">'+esc(d.stage||'—')+'</span></div>';
  // 핀
  var pin=d.pin||{};
  h+='<div class="dhead"><div class="pin">'+
     (pin['예식일']?'<span class="pchip">'+(isSnap?'촬영':'예식')+' '+esc(fmtDate(pin['예식일']))+'</span>':'')+
     (pin['하객']?'<span class="pchip">하객 '+esc(pin['하객'])+'</span>':'')+
     '<span class="pchip">'+esc(d.product||'—')+'</span><span class="code">'+esc(d.code)+'</span></div></div>';
  // 연락
  h+='<div class="contact">';
  if(d.phone) h+='<a href="tel:'+esc(d.phone.replace(/[^0-9+]/g,''))+'">📞 전화</a>';
  if(d.phone) h+='<button id="copyPhone">연락처 복사</button>';
  if(d.email) h+='<a href="mailto:'+esc(d.email)+'">✉ 메일</a>';
  h+='</div>';
  // 신청 내용(27필드) 토글
  if(c&&c.fields&&c.fields.length){
    h+='<button class="fields-toggle" id="fldToggle">신청 내용 보기 ▾</button><div class="fields" id="fldBox">'+fieldGroups(c.fields)+'</div>';
  }
  // 카드 (product-aware)
  (d.cards||[]).forEach(function(k){ h+=renderCard(k,d,isSnap); });
  // 메모
  h+='<div class="card"><div class="card-h"><span class="ct">관리자 메모</span><span style="margin-left:auto;font-size:10px;color:var(--label-soft)">내부 전용</span></div>'+
     '<textarea class="memo-area" id="memoArea" placeholder="고객에겐 안 보이는 내부 메모">'+esc(d.memo||'')+'</textarea>'+
     '<div class="actions"><button class="btn btn-line btn-sm" id="memoSave">메모 저장</button></div></div>';
  // 처리 이력
  if(d.history&&d.history.length){
    h+='<div class="card"><div class="card-h"><span class="ct">처리 이력</span></div><div class="hist">'+d.history.map(function(l){ return '<div class="hl">'+esc(shortHist(l))+'</div>'; }).join('')+'</div></div>';
  }
  // ⚙ 고급 (강제 변경)
  h+=advancedBox(d);

  $('detailBody').innerHTML=h;
  bindDetail(d);
}

}

function bindDetail(d){
  var cp=$('copyPhone'); if(cp) cp.addEventListener('click', function(){ copyText(d.phone, cp); });
  var ft=$('fldToggle'); if(ft) ft.addEventListener('click', function(){ var b=$('fldBox'); b.classList.toggle('open'); ft.textContent=b.classList.contains('open')?'신청 내용 접기 ▴':'신청 내용 보기 ▾'; });
  var ms=$('memoSave'); if(ms) ms.addEventListener('click', saveMemo);
  var ci=$('copyInv'); if(ci){ var inv=d.mirror&&d.mirror.invitation, u=inv&&inv.published&&inv.published.urls; if(u) ci.addEventListener('click', function(){ copyText(u.online||u.offline||'', ci); }); }
  // 거울·동의 토글
  $('detailBody').querySelectorAll('.mt[data-mt]').forEach(function(b){ b.addEventListener('click', function(){ var box=$('mb_'+b.getAttribute('data-mt')); if(box){ box.classList.toggle('open'); b.textContent=b.textContent.replace(/[▾▴]/,box.classList.contains('open')?'▴':'▾'); } }); });
  // 카드 액션 버튼
  $('detailBody').querySelectorAll('.btn[data-da]').forEach(function(b){ b.addEventListener('click', function(){ onDetailAct(b.getAttribute('data-da'), d); }); });
  // 고급
  var at=$('advToggle'); if(at) at.addEventListener('click', function(){ $('advBody').classList.toggle('open'); });
  var fg=$('fGo'); if(fg) fg.addEventListener('click', function(){ doForce(d.code, d.names, $('fStage').value, $('fReason').value); });
}
function onDetailAct(act,d){
  var code=d.code, names=d.names, isSnap=snap(d.product);
  if(act==='approve') doApprove(code,names);
  else if(act==='accept') doAccept(code,names);
  else if(act==='cancel') doCancel(code,names);
  else if(act==='propose') openPropose(code,names);
  else if(act==='consultDone') doConsultDone(code,names);
  else if(act==='noshow') doNoshow(code,names);
  else if(act==='openFitting') doOpenFitting(code,names);
  else if(act==='closeFitting') doCloseFitting(code,names);
  else if(act==='sendContract') openSendContract(code,names,d);
  else if(act==='uncontracted') doUncontracted(code,names);
  else if(act==='confirmPay') doConfirmPay(code,names);
  else if(act==='confirmBalance') doConfirmBalance(code,names);
  else if(act==='setResult') openSetResult(code,names,isSnap,d);
  else if(act==='eventDone') doEventDone(code,names,isSnap);
  else if(act==='delivered') doDelivered(code,names);
  else if(act==='confirmExtra') doConfirmExtra(code,names,d);
}

/* ════════ 액션 모달 (큐·상세 공용) ════════ */
var _modalYes=null;
function openModal(opt){
  $('cm_title').textContent=opt.title;
  $('cm_text').innerHTML=opt.text||'';
  $('cm_extra').innerHTML=opt.extra||'';
  $('cm_err').textContent='';
  $('cm_yes').disabled=false;
  $('cm_yes').textContent=opt.yes||'확인';
  $('cm_yes').className='btn '+(opt.danger?'btn-danger':'btn-seal');
  $('modalBox').className='modal'+(opt.danger?' danger':'');
  _modalYes=opt.onYes;
  $('confirmModal').classList.add('show');
  if(opt.init) opt.init();
}
function closeModal(){ $('confirmModal').classList.remove('show'); _modalYes=null; }
$('cm_no').addEventListener('click', closeModal);
$('cm_yes').addEventListener('click', function(){ if(_modalYes) _modalYes(); });
$('confirmModal').addEventListener('click', function(e){ if(e.target===$('confirmModal')) closeModal(); });
document.addEventListener('keydown', function(e){ if(e.key==='Escape'&&$('confirmModal').classList.contains('show')) closeModal(); });
function mErr(m){ $('cm_err').textContent=m||''; }
function mBusy(b,lbl){ $('cm_yes').disabled=b; $('cm_yes').textContent=b?'처리 중…':(lbl||'확인'); }
function b(s){ return '<b>'+esc(s)+'</b>'; }
function li(s){ return '<span class="li">· '+esc(s)+'</span>'; }

function runAct(fnArgs, code, lbl){
  mBusy(true); mErr('');
  gas.apply(null, fnArgs).then(function(r){ if(r&&r.ok){ afterAction(code,r); } else { mBusy(false,lbl); mErr(r&&r.error||'실패'); } })
    .catch(function(e){ mBusy(false,lbl); mErr('오류: '+(e&&e.message||e)); });
}
function afterAction(code,res){
  closeModal();
  if(res&&res.archived){ toast('처리됨 · 아카이브로 이동'); if(_view==='archive') loadArchive(); else loadHome(); return; }
  toast('✓ 처리됨');
  if(_view==='detail') openDetail(code);
  else if(_view==='archive') loadArchive();
  else loadHome();
}

function doApprove(code,names){ openModal({ title:'이 상담을 승인할까요?', text:b(names)+li('고객에게 확정 메일이 가요')+li('캘린더에 일정이 생겨요'), yes:'승인', onYes:function(){ runAct(['adminApprove',code],code,'승인'); } }); }
function doAccept(code,names){ openModal({ title:'변경 제안을 수락할까요?', text:b(names)+li('제안한 시간으로 확정돼요'), yes:'수락', onYes:function(){ runAct(['adminAcceptProposal',code],code,'수락'); } }); }
function doConsultDone(code,names){ openModal({ title:'상담완료로 넘길까요?', text:b(names)+li('단계가 상담완료로 바뀌어요')+li('계약서를 발송할 수 있게 돼요'), yes:'넘기기', onYes:function(){ runAct(['adminMarkConsultDone',code],code,'넘기기'); } }); }
function doConfirmPay(code,names){ openModal({ title:'입금을 확인 처리할까요?', text:b(names)+li('단계가 입금완료로 넘어가요')+li('되돌리려면 강제 변경이 필요해요'), yes:'입금 확인', onYes:function(){ runAct(['adminConfirmPayment',code],code,'입금 확인'); } }); }
function doConfirmBalance(code,names){ openModal({ title:'잔금을 확인 처리할까요?', text:b(names)+li('잔금상태가 확인으로 바뀌어요')+li('단계는 그대로 — 제작 계속 가능'), yes:'잔금 확인', onYes:function(){ runAct(['adminConfirmBalance',code],code,'잔금 확인'); } }); }
function doEventDone(code,names,isSnap){ var w=isSnap?'촬영':'예식'; openModal({ title:w+'완료로 넘길까요?', text:b(names)+li('단계가 '+w+'완료로 바뀌어요')+li('결과물 단계가 열려요'), yes:'넘기기', onYes:function(){ runAct(['adminMarkEventDone',code],code,'넘기기'); } }); }
function doDelivered(code,names){ openModal({ title:'결과물 전달 완료로 넘길까요?', text:b(names)+li('고객 마이페이지에 결과물 단계가 열려요')+li('이 고객은 아카이브로 이동해요'), yes:'전달 완료', onYes:function(){ runAct(['adminMarkDelivered',code],code,'전달 완료'); } }); }
function doConfirmExtra(code,names,d){ var r=(d&&d.raw)||{}; openModal({ title:'추가 보정 입금을 확인할까요?', text:b(names)+li('추가 보정 '+(r['추가보정수량']||'0')+'컷'+(r['추가보정금액']?(' · '+Number(r['추가보정금액']).toLocaleString()+'원'):''))+li('추가보정상태가 완료로 바뀌어요'), yes:'입금 확인', onYes:function(){ runAct(['adminConfirmExtra',code],code,'입금 확인'); } }); }
function doCancel(code,names){ var extra='<div class="field"><label>취소 사유</label><select id="cxR"><option value="고객 요청">고객 요청</option><option value="일정 안 맞음">일정 안 맞음</option><option value="기타">기타</option></select></div>';
  openModal({ title:'이 예약을 취소할까요?', danger:true, text:b(names)+li('캘린더 일정이 삭제돼요')+li('되돌릴 수 없어요'), extra:extra, yes:'취소 확정', onYes:function(){ runAct(['adminCancel',code,$('cxR')?$('cxR').value:''],code,'취소 확정'); } }); }
function doNoshow(code,names){ openModal({ title:'상담에 안 오셨나요? 노쇼로 정리할까요?', danger:true, text:b(names)+li('이 고객은 아카이브로 이동해요')+li('되돌리려면 ⚙ 고급 강제 변경'), yes:'노쇼 처리', onYes:function(){ runAct(['adminMarkNoshow',code],code,'노쇼 처리'); } }); }
function doUncontracted(code,names){ openModal({ title:'계약이 성사되지 않았나요? 미계약으로 정리할까요?', danger:true, text:b(names)+li('이 고객은 아카이브로 이동해요')+li('되돌리려면 ⚙ 고급 강제 변경'), yes:'미계약 처리', onYes:function(){ runAct(['adminMarkUncontracted',code],code,'미계약 처리'); } }); }
function doOpenFitting(code,names){ openModal({ title:'시착 동의서를 보낼까요?', text:b(names)+li('현재단계가 시착으로 넘어가요')+li('고객 마이페이지에 시착 동의서가 떠요'), yes:'보내기', onYes:function(){ runAct(['adminOpenFittingConsent',code],code,'보내기'); } }); }
function doCloseFitting(code,names){ openModal({ title:'시착 동의를 닫을까요?', text:b(names)+li('고객 화면에서 동의서가 사라져요'), yes:'닫기', onYes:function(){ runAct(['adminCloseFitting',code],code,'닫기'); } }); }

function openSendContract(code,names,d){
  var preset = snap(d.product)?'600000':'2800000';
  var extra='<div class="field"><label>계약 총액</label><select id="ctSel">'+
    '<option value="2800000">주말·공휴일 — 280만</option><option value="2100000">평일 — 210만</option><option value="600000">스냅 — 60만</option><option value="__etc">직접 입력</option></select></div>'+
    '<div class="field" id="ctEtcWrap" style="display:none"><label>총액 직접 입력 (원)</label><input type="text" id="ctEtc" inputmode="numeric" placeholder="예: 2800000"></div>'+
    '<div class="field"><label>계약서 링크 (필수·https)</label><input type="url" id="ctLink" inputmode="url" autocomplete="off" placeholder="https://…"></div>';
  openModal({ title:'계약서 발송', text:bumpName(names)+'님께 계약서를 발송해요.<span class="li">서명하면 72시간 기한이 시작돼요.</span>', extra:extra, yes:'발송',
    init:function(){ var pre=$('ctLink'); if(d.raw&&d.raw['계약서링크']) pre.value=d.raw['계약서링크']; var sel=$('ctSel'); sel.value=preset; sel.addEventListener('change',function(){ $('ctEtcWrap').style.display=(sel.value==='__etc')?'block':'none'; }); },
    onYes:function(){ var sel=$('ctSel').value; var total=(sel==='__etc')?String($('ctEtc').value||'').replace(/[^0-9]/g,''):sel; var link=String($('ctLink').value||'').trim();
      if(!/^https?:\/\//i.test(link)){ mErr('계약서 링크(https://…)를 입력해 주세요.'); return; }
      runAct(['adminSendContract',code,link,total],code,'발송'); } });
}
function bumpName(n){ return '<b>'+esc(n)+'</b>'; }

function openSetResult(code,names,isSnap,d){
  var r=d.raw||{};
  var extra='<div class="field"><label>원본 드라이브 링크</label><input type="url" id="rOrig" inputmode="url" autocomplete="off" placeholder="https://…" value="'+esc(r['원본링크']||'')+'"></div>'+
    '<div class="field"><label>보정본 폴더 링크</label><input type="url" id="rReto" inputmode="url" autocomplete="off" placeholder="https://…" value="'+esc(r['보정본폴더']||'')+'"></div>'+
    (isSnap?'':'<div class="field"><label>본식 영상 링크</label><input type="url" id="rVid" inputmode="url" autocomplete="off" placeholder="https://…" value="'+esc(r['영상링크']||'')+'"></div>');
  openModal({ title:'결과물 링크 등록', text:bumpName(names)+li('부분 입력 가능 (원본만 먼저 OK)')+li('원본만 저장 → 원본전달(고객이 고르기 시작) · 보정본 저장 → 보정중'), extra:extra, yes:'저장',
    onYes:function(){ var links={ '원본':String($('rOrig').value||'').trim(), '보정본':String($('rReto').value||'').trim(), '영상':(isSnap?'':String($('rVid')?$('rVid').value:'').trim()) };
      runAct(['adminSetResultLinks',code,links],code,'저장'); } });
}

function openPropose(code,names){
  gas('adminAvailability').then(function(d){
    if(d&&d.ok){ SLOTS.weekday=d.slotsWeekday||[]; SLOTS.weekend=d.slotsWeekend||[]; }
    var extra='<div class="field"><label>날짜</label><input type="date" id="pDate"></div>'+
      '<div class="field"><label>시간</label><select id="pTime"><option value="">날짜를 먼저 선택</option></select></div>'+
      '<div class="field"><label>메모(선택)</label><input type="text" id="pMemo" placeholder="고객에게 전할 한마디"></div>';
    openModal({ title:'시간 변경 제안', text:bumpName(names)+'님께 새 시간을 제안해요.', extra:extra, yes:'제안 보내기',
      init:function(){ var pd=$('pDate'); if(pd) pd.addEventListener('change',function(){ fillTimes(pd.value); }); },
      onYes:function(){ var nd=$('pDate').value, nt=$('pTime').value; if(!nd||!nt){ mErr('날짜와 시간을 선택해 주세요.'); return; } runAct(['adminProposeTime',code,nd,nt,$('pMemo').value||''],code,'제안 보내기'); } });
  }).catch(function(){ toast('슬롯 로드 실패'); });
}
function fillTimes(dateStr){ var sel=$('pTime'); if(!sel) return; var slots=[]; if(dateStr){ var d=new Date(dateStr+'T00:00:00'); var wd=d.getDay(); slots=(wd===0||wd===6)?SLOTS.weekend:SLOTS.weekday; } sel.innerHTML=slots.length?slots.map(function(s){return '<option value="'+s+'">'+s+'</option>';}).join(''):'<option value="">가능한 시간 없음</option>'; }

function doForce(code,names,target,reason){
  reason=String(reason||'').trim();
  if(!reason){ toast('강제 변경 사유를 입력해 주세요'); return; }
  openModal({ title:'강제로 단계를 바꿀까요?', danger:true, text:bumpName(names)+li('→ '+target+'(으)로 강제 변경')+li('⚠ 그 이후 단계 진행 데이터(계약·입금·시착 등)가 초기화돼요')+li('상담 예약(캘린더)은 별개예요')+li('이력에 남아요'), yes:'강제 변경',
    onYes:function(){ runAct(['adminForceStage',code,target,reason],code,'강제 변경'); } });
}

function saveMemo(){
  var memo=$('memoArea').value, btn=$('memoSave');
  btn.disabled=true; btn.textContent='저장 중…';
  gas('adminSaveMemo', curDetail.code, memo).then(function(d){ btn.disabled=false; btn.textContent='메모 저장'; toast(d&&d.ok?'저장됨':'저장 실패'); }).catch(function(){ btn.disabled=false; btn.textContent='메모 저장'; toast('오류'); });
}

/* ════════ 아카이브 ════════ */
function openArchive(){ _arcQuery=''; _arcFilter='all'; $('aq').value=''; loadArchive(); }
function loadArchive(){
  show('loading'); $('loading').innerHTML='<div class="spinner"></div>불러오는 중…';
  gas('adminArchive', _arcQuery, _arcFilter).then(function(d){
    if(!d||!d.ok){ toast('불러오기 실패'); return; }
    renderArchive(d); show('archive');
  }).catch(function(){ toast('오류'); });
}
function renderArchive(d){
  var chips=[['all','전체'],['done','완료(전달)'],['stopped','중단']];
  $('aChips').innerHTML=chips.map(function(c){ return '<div class="achip'+(_arcFilter===c[0]?' active':'')+'" data-f="'+c[0]+'">'+esc(c[1])+'</div>'; }).join('');
  $('aChips').querySelectorAll('.achip').forEach(function(el){ el.addEventListener('click', function(){ _arcFilter=el.getAttribute('data-f'); loadArchive(); }); });
  var html='';
  if(!d.results.length) html='<div class="empty">'+(_arcQuery?('\''+esc(_arcQuery)+'\' 결과가 없어요'):'끝난 고객이 없어요')+'</div>';
  else {
    if(!_arcQuery) html+='<div class="qhead">최근 종료 '+d.results.length+'명'+(d.total>d.results.length?(' (전체 '+d.total+')'):'')+'</div>';
    html+=d.results.map(function(r){
      var done=r.endType==='완료';
      return '<div class="arow" data-code="'+esc(r.code)+'"><span class="endchip '+(done?'done':'stopped')+'">'+(done?'✓':'✕')+' '+esc(r.endTypeLabel)+'</span>'+
        '<span class="an">'+esc(r.names)+' <span style="font-size:10px;color:var(--label-soft)">'+esc(prodLabel(r.product))+'</span></span>'+
        (r.modified?'<span class="ad">종료 '+esc(fmtDT(r.modified))+'</span>':'')+'</div>';
    }).join('');
  }
  $('archiveBody').innerHTML=html;
  $('archiveBody').querySelectorAll('.arow').forEach(function(el){ el.addEventListener('click', function(){ openDetail(el.getAttribute('data-code'),'archive'); }); });
}
</script>
