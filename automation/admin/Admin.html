<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<base target="_top">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+KR:wght@300;400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --paper:#FAFAF8;--paper2:#F5F3EF;--paper3:#EDEBE6;--card:#FFFFFF;
  --ink:#1C1B19;--sub:#5A554C;--light:#75705F;--accent:#3A2D22;
  --gold:#B89A75;--gold-deep:#9A7B4F;--gold-deeper:#7A5F37;--gold-line:#E6E1D8;
  --seal:#6B2A24;--border:#DDD8D1;--divider:#EDEAE4;--label-soft:#8A8475;
  --blue:#3F6F7A;
  --serif:'Cormorant Garamond',Georgia,serif;--serif-ko:'Noto Serif KR',serif;
  --sans:'Noto Sans KR',-apple-system,sans-serif;--mono:'Roboto Mono',monospace;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-weight:300;font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased;word-break:keep-all;min-height:100vh}

/* 헤더 */
.topbar{position:sticky;top:0;z-index:10;background:rgba(250,250,248,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--gold-line);padding:14px 18px;display:flex;align-items:center;gap:10px}
.topbar .wm{font-family:var(--serif);font-size:13px;font-weight:600;letter-spacing:.22em;color:var(--accent)}
.topbar .who{margin-left:auto;font-family:var(--serif-ko);font-size:12px;color:var(--sub)}
.topbar .refresh{background:none;border:1px solid var(--border);border-radius:6px;width:34px;height:34px;cursor:pointer;color:var(--gold-deeper);font-size:15px;flex:none}
.topbar .refresh:active{background:var(--paper2)}

main{max-width:560px;margin:0 auto;padding:16px 16px 64px}

/* 검색 */
.search{display:flex;gap:8px;margin-bottom:18px}
.search input{flex:1;border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-family:var(--sans);font-size:14px;color:var(--accent);background:#fff;outline:none}
.search input:focus{border-color:var(--gold)}
.search button{flex:none;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0 16px;font-family:var(--serif-ko);font-size:13px;cursor:pointer}

/* 묶음 */
.group{margin-bottom:22px}
.group-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.group-head .gt{font-family:var(--serif-ko);font-size:14px;font-weight:600;color:var(--accent)}
.group-head .badge{font-family:var(--mono);font-size:11px;font-weight:500;color:#fff;background:var(--seal);border-radius:11px;min-width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;padding:0 6px}
.group-head .badge.zero{background:var(--label-soft)}
.group.urgent .gt{color:var(--seal)}

.row{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:13px 15px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:border-color .2s}
.row:active{border-color:var(--gold)}
.row .rl{flex:1;min-width:0}
.row .nm{font-family:var(--serif-ko);font-size:14.5px;font-weight:500;color:var(--accent)}
.row .meta{font-family:var(--serif-ko);font-size:12px;color:var(--light);margin-top:2px}
.row .prod{font-family:var(--serif);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold-deeper);border:1px solid var(--gold-line);border-radius:10px;padding:2px 8px;flex:none}
.row.today{border-color:var(--seal);background:rgba(107,42,36,.03)}
.row .todaytag{font-family:var(--serif-ko);font-size:10px;color:var(--seal);font-weight:500;flex:none}
.row .arrow{color:var(--label-soft);flex:none}
.empty{font-family:var(--serif-ko);font-size:13px;color:var(--label-soft);text-align:center;padding:30px 0}

/* 상세 */
.back{display:inline-flex;align-items:center;gap:6px;font-family:var(--serif-ko);font-size:13px;color:var(--sub);background:none;border:none;cursor:pointer;margin-bottom:14px;padding:4px 0}
.dhead{margin-bottom:14px}
.dhead .nm{font-family:var(--serif-ko);font-size:21px;font-weight:600;color:var(--accent)}
.dhead .tags{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.dhead .prod{font-family:var(--serif);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-deeper);border:1px solid var(--gold-line);border-radius:11px;padding:3px 11px}
.dhead .stage{font-family:var(--serif-ko);font-size:12px;color:#fff;background:var(--accent);border-radius:11px;padding:3px 12px}
.dhead .code{font-family:var(--mono);font-size:11px;color:var(--label-soft)}
.contact{display:flex;gap:8px;margin-bottom:18px}
.contact a{flex:1;text-align:center;border:1px solid var(--border);border-radius:8px;padding:10px;font-family:var(--serif-ko);font-size:13px;color:var(--accent);text-decoration:none;background:#fff}
.contact a:active{background:var(--paper2)}

.sec{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px}
.sec.locked{opacity:.5;text-align:center;padding:14px;font-family:var(--serif-ko);font-size:12.5px;color:var(--label-soft)}
.sec-t{font-family:var(--serif);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-t .st{font-family:var(--serif-ko);font-size:12px;letter-spacing:0;text-transform:none;color:#fff;background:var(--seal);border-radius:10px;padding:2px 10px}
.sched{font-family:var(--serif-ko);font-size:15px;font-weight:500;color:var(--accent);margin-bottom:6px}
.sched .sub{font-size:12px;font-weight:300;color:var(--light)}
.warnbox{font-family:var(--serif-ko);font-size:12px;color:var(--seal);background:rgba(107,42,36,.05);border:1px solid rgba(107,42,36,.18);border-radius:7px;padding:9px 12px;margin:8px 0}

/* 27필드 */
.fields-toggle{font-family:var(--serif-ko);font-size:12.5px;color:var(--gold-deeper);background:var(--paper2);border:1px solid var(--gold-line);border-radius:7px;padding:9px 12px;cursor:pointer;width:100%;text-align:left;margin-top:6px}
.fields{margin-top:8px;display:none}
.fields.open{display:block}
.fld{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--divider);font-size:12.5px}
.fld:last-child{border-bottom:none}
.fld .k{flex:none;width:84px;font-family:var(--serif-ko);color:var(--label-soft)}
.fld .v{flex:1;font-family:var(--serif-ko);color:var(--ink);line-height:1.6;white-space:pre-wrap}
.fld .v a{color:var(--blue)}

.kv{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--divider);font-size:13px}
.kv:last-child{border-bottom:none}
.kv .k{flex:none;width:84px;font-family:var(--serif-ko);color:var(--label-soft)}
.kv .v{flex:1;font-family:var(--serif-ko);color:var(--ink)}

/* 메모 */
.memo-area{width:100%;border:1px solid var(--border);border-radius:8px;padding:11px;font-family:var(--sans);font-size:13px;color:var(--accent);background:#fff;resize:vertical;min-height:70px;outline:none;line-height:1.6}
.memo-area:focus{border-color:var(--gold)}
.memo-save{margin-top:8px;background:#fff;border:1px solid var(--gold-deep);color:var(--gold-deeper);border-radius:7px;padding:8px 16px;font-family:var(--serif-ko);font-size:12.5px;cursor:pointer}

/* 버튼 */
.actions{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.btn{display:block;width:100%;text-align:center;padding:14px 0;border:none;border-radius:8px;font-family:var(--serif-ko);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-seal{background:var(--seal);color:#fff}
.btn-seal:active{background:#5A231E}
.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--sub)}
.btn-ghost:active{background:var(--paper2)}
.btn-line{background:#fff;border:1px solid var(--gold-deep);color:var(--gold-deeper)}

/* 로딩·토스트 */
#loading{text-align:center;padding:60px 0;color:var(--light);font-family:var(--serif-ko);font-size:13px}
.spinner{width:26px;height:26px;border:2px solid var(--gold-line);border-top-color:var(--seal);border-radius:50%;margin:0 auto 14px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#fff;font-family:var(--serif-ko);font-size:13px;padding:11px 20px;border-radius:24px;opacity:0;transition:all .3s var(--ease);z-index:60;pointer-events:none;max-width:90%;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 모달 */
.modal-ov{position:fixed;inset:0;background:rgba(28,27,25,.5);display:none;align-items:flex-start;justify-content:center;padding:24px;padding-top:16vh;z-index:50;overflow-y:auto}
.modal-ov.show{display:flex}
.modal{background:#fff;border-radius:12px;max-width:380px;width:100%;padding:26px 24px;box-shadow:0 20px 50px rgba(0,0,0,.2)}
.modal h3{font-family:var(--serif-ko);font-size:17px;font-weight:600;color:var(--accent);text-align:center;margin-bottom:10px}
.modal p{font-family:var(--serif-ko);font-size:13.5px;color:var(--sub);text-align:center;line-height:1.7;margin-bottom:18px}
.modal .field{margin-bottom:12px}
.modal label{display:block;font-family:var(--serif-ko);font-size:11px;color:var(--label-soft);margin-bottom:5px}
.modal input,.modal select{width:100%;border:1px solid var(--border);border-radius:7px;padding:11px;font-family:var(--sans);font-size:14px;color:var(--accent);background:#fff;outline:none}
.modal input:focus,.modal select:focus{border-color:var(--gold)}
.modal .mbtns{display:flex;gap:8px;margin-top:8px}
.modal .mbtns .btn{flex:1;padding:13px 0}
.modal .merr{font-family:var(--serif-ko);font-size:12px;color:var(--seal);text-align:center;min-height:16px;margin-bottom:6px}
</style>
</head>
<body>

<div class="topbar">
  <span class="wm">MOMENT EDIT</span>
  <span class="who"><?= adminName ?>님</span>
  <button class="refresh" id="btnRefresh" title="새로고침">↻</button>
</div>

<main>
  <div id="loading"><div class="spinner"></div>불러오는 중…</div>

  <!-- 홈 -->
  <section id="homeView" style="display:none">
    <div class="search">
      <input type="text" id="q" placeholder="개인코드·이름·연락처 검색" autocomplete="off">
      <button id="btnSearch">검색</button>
    </div>
    <div id="homeBody"></div>
  </section>

  <!-- 상세 -->
  <section id="detailView" style="display:none">
    <button class="back" id="btnBack">← 목록</button>
    <div id="detailBody"></div>
  </section>
</main>

<div id="toast"></div>

<!-- 확인 모달 -->
<div class="modal-ov" id="confirmModal">
  <div class="modal">
    <h3 id="cm_title">확인</h3>
    <p id="cm_text"></p>
    <div id="cm_extra"></div>
    <div class="merr" id="cm_err"></div>
    <div class="mbtns">
      <button class="btn btn-ghost" id="cm_no">취소</button>
      <button class="btn btn-seal" id="cm_yes">확인</button>
    </div>
  </div>
</div>

<script>
var ADMIN_NAME = <?= JSON.stringify(adminName) ?>;
var SLOTS = { weekday: [], weekend: [] };
var curDetail = null;   // 현재 열린 상세 데이터

function $(id){ return document.getElementById(id); }
function show(view){
  $('loading').style.display = (view==='loading')?'block':'none';
  $('homeView').style.display = (view==='home')?'block':'none';
  $('detailView').style.display = (view==='detail')?'block':'none';
  window.scrollTo(0,0);
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];}); }
function toast(msg){ var t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); },2200); }

function gas(fn){ // google.script.run 프라미스 래퍼
  var args = Array.prototype.slice.call(arguments,1);
  return new Promise(function(res,rej){
    google.script.run.withSuccessHandler(res).withFailureHandler(rej)[fn].apply(null,args);
  });
}

// ── 부팅 ──
loadHome();
$('btnRefresh').addEventListener('click', loadHome);
$('btnBack').addEventListener('click', loadHome);
$('btnSearch').addEventListener('click', doSearch);
$('q').addEventListener('keydown', function(e){ if(e.key==='Enter') doSearch(); });

function loadHome(){
  show('loading');
  gas('adminHome').then(function(d){
    if(!d || !d.ok){ $('loading').textContent='불러오기 실패'; return; }
    renderHome(d.groups); show('home');
  }).catch(function(e){ $('loading').textContent='오류: '+(e&&e.message||e); });
}

function groupBlock(title, items, opt){
  opt=opt||{};
  var n=items.length;
  var head='<div class="group-head"><span class="gt">'+esc(title)+'</span><span class="badge'+(n?'':' zero')+'">'+n+'</span></div>';
  if(!n) return '<div class="group'+(opt.urgent?' urgent':'')+'">'+head+'<div class="empty">없음</div></div>';
  var rows=items.map(function(it){
    var meta=[];
    if(it.dateLabel) meta.push(esc(it.dateLabel)+(it.time?(' · '+esc(it.time)):''));
    var today = it.isToday ? '<span class="todaytag">● 오늘</span>' : '';
    var prod = it.product ? '<span class="prod">'+esc(it.product==='웨딩스냅'?'스냅':'시그니처')+'</span>' : '';
    return '<div class="row'+(it.isToday?' today':'')+'" data-code="'+esc(it.code)+'">'+
      '<div class="rl"><div class="nm">'+esc(it.names)+'</div>'+(meta.length?'<div class="meta">'+meta.join('')+'</div>':'')+'</div>'+
      today+prod+'<span class="arrow">›</span></div>';
  }).join('');
  return '<div class="group'+(opt.urgent?' urgent':'')+'">'+head+rows+'</div>';
}

function renderHome(g){
  var html='';
  html+=groupBlock('승인 대기', g.pending, {urgent:true});
  html+=groupBlock('변경 제안 대기', g.proposed, {});
  html+=groupBlock('새 신청', g.applied, {});
  html+=groupBlock('다가오는 상담 (7일)', g.upcoming, {});
  var total=g.pending.length+g.proposed.length+g.applied.length+g.upcoming.length;
  if(!total) html='<div class="empty">처리할 일이 없어요 ✓</div>';
  $('homeBody').innerHTML=html;
  bindRows($('homeBody'));
}
function bindRows(container){
  container.querySelectorAll('.row').forEach(function(el){
    el.addEventListener('click', function(){ openDetail(el.getAttribute('data-code')); });
  });
}

function doSearch(){
  var q=$('q').value.trim();
  if(!q){ loadHome(); return; }
  show('loading');
  gas('adminSearch', q).then(function(d){
    if(!d||!d.ok){ toast('검색 실패'); show('home'); return; }
    var html='<div class="group"><div class="group-head"><span class="gt">검색 결과</span><span class="badge'+(d.results.length?'':' zero')+'">'+d.results.length+'</span></div>';
    if(!d.results.length) html+='<div class="empty">결과 없음</div>';
    else html+=d.results.map(function(it){
      return '<div class="row" data-code="'+esc(it.code)+'"><div class="rl"><div class="nm">'+esc(it.names)+'</div><div class="meta">'+esc(it.stage||'')+' · '+esc(it.code)+'</div></div>'+
        (it.product?'<span class="prod">'+esc(it.product==='웨딩스냅'?'스냅':'시그니처')+'</span>':'')+'<span class="arrow">›</span></div>';
    }).join('');
    html+='</div>';
    $('homeBody').innerHTML=html; bindRows($('homeBody')); show('home');
  }).catch(function(){ toast('검색 오류'); show('home'); });
}

// ── 상세 ──
function openDetail(code){
  show('loading');
  gas('adminDetail', code).then(function(d){
    if(!d||!d.ok){ toast(d&&d.error||'불러오기 실패'); loadHome(); return; }
    curDetail=d; renderDetail(d); show('detail');
  }).catch(function(e){ toast('오류'); loadHome(); });
}

function renderDetail(d){
  var c=d.consult;
  var isSnap=(d.product==='웨딩스냅');
  var L=isSnap?'촬영':'상담';
  var h='';
  // 상단
  h+='<div class="dhead"><div class="nm">'+esc(d.names)+'</div><div class="tags">'+
     (d.product?'<span class="prod">'+esc(isSnap?'웨딩스냅':'시그니처')+'</span>':'')+
     (d.stage?'<span class="stage">'+esc(d.stage)+'</span>':'')+
     '<span class="code">'+esc(d.code)+'</span></div></div>';
  // 연락
  var cont='';
  if(d.phone) cont+='<a href="tel:'+esc(d.phone.replace(/[^0-9+]/g,''))+'">📞 '+esc(d.phone)+'</a>';
  if(d.email) cont+='<a href="mailto:'+esc(d.email)+'">✉ 메일</a>';
  if(cont) h+='<div class="contact">'+cont+'</div>';

  // [상담] 섹션
  if(c){
    h+='<div class="sec"><div class="sec-t">'+L+' <span class="st">'+esc(c.status)+'</span></div>';
    if(c.date) h+='<div class="sched">'+esc(c.date)+(c.time?(' · '+esc(c.time)):'')+'</div>';
    if(c.status==='변경제안'&&c.proposedDate) h+='<div class="sched sub">제안: '+esc(c.proposedDate)+' '+esc(c.proposedTime)+'</div>';
    if(c.refund) h+='<div class="kv"><span class="k">환불계좌</span><span class="v">'+esc(c.refund)+'</span></div>';
    if(c.confirmedAt) h+='<div class="kv"><span class="k">확정일시</span><span class="v">'+esc(c.confirmedAt)+'</span></div>';
    if(c.cancelledAt) h+='<div class="kv"><span class="k">취소일시</span><span class="v">'+esc(c.cancelledAt)+'</span></div>';
    // 27필드 토글
    h+='<button class="fields-toggle" id="fldToggle">신청 내용 보기 ▾</button><div class="fields" id="fldBox">';
    h+=c.fields.map(function(f){
      var v=f.isLink ? '<a href="'+esc(f.value)+'" target="_blank" rel="noopener">'+esc(f.value)+'</a>' : esc(f.value);
      return '<div class="fld"><span class="k">'+esc(f.label)+'</span><span class="v">'+v+'</span></div>';
    }).join('');
    h+='</div>';
    // 동작 버튼
    h+='<div class="actions" id="cActions">'+consultActions(c.status, L)+'</div>';
    h+='</div>';
  } else {
    h+='<div class="sec locked">상담 신청 정보가 없습니다.</div>';
  }

  // 메모 (내부 전용)
  h+='<div class="sec"><div class="sec-t">관리자 메모 <span style="font-family:var(--serif-ko);font-size:10px;color:var(--label-soft);letter-spacing:0;text-transform:none">내부 전용</span></div>'+
     '<textarea class="memo-area" id="memoArea" placeholder="고객에겐 안 보이는 내부 메모">'+esc(d.memo)+'</textarea>'+
     '<button class="memo-save" id="memoSave">메모 저장</button></div>';

  // v2·v3 자리
  h+='<div class="sec locked">[ 계약 ] — v2 (P2 이후)</div>';
  h+='<div class="sec locked">[ 제작 ] — v3 (P3 이후)</div>';

  $('detailBody').innerHTML=h;

  // 바인딩
  var ft=$('fldToggle'); if(ft) ft.addEventListener('click', function(){ var b=$('fldBox'); b.classList.toggle('open'); ft.textContent = b.classList.contains('open')?'신청 내용 접기 ▴':'신청 내용 보기 ▾'; });
  var ms=$('memoSave'); if(ms) ms.addEventListener('click', saveMemo);
  bindActions(d.code, c?c.status:'');
}

function consultActions(status, L){
  if(status==='시간선택완료'){
    return '<button class="btn btn-seal" data-act="approve">✓ 승인</button>'+
           '<button class="btn btn-line" data-act="propose">시간 변경 제안</button>'+
           '<button class="btn btn-ghost" data-act="cancel">취소</button>';
  }
  if(status==='변경제안'){
    return '<button class="btn btn-seal" data-act="accept">✓ 변경 수락</button>'+
           '<button class="btn btn-line" data-act="propose">다시 제안</button>'+
           '<button class="btn btn-ghost" data-act="cancel">취소</button>';
  }
  if(status==='승인완료'||status==='확정'){
    return '<button class="btn btn-line" data-act="propose">시간 변경 제안</button>'+
           '<button class="btn btn-ghost" data-act="cancel">예약 취소</button>';
  }
  if(status==='신청접수'){
    return '<div class="warnbox">아직 고객이 일정을 선택하지 않았습니다.</div>'+
           '<button class="btn btn-line" data-act="propose">시간 직접 제안</button>'+
           '<button class="btn btn-ghost" data-act="cancel">취소</button>';
  }
  if(status==='취소'){ return '<div class="warnbox">취소된 예약입니다.</div>'; }
  return '';
}

function bindActions(code, status){
  document.querySelectorAll('#cActions .btn[data-act]').forEach(function(el){
    el.addEventListener('click', function(){ onAction(el.getAttribute('data-act'), code); });
  });
}

// ── 동작 (확인 한 단계) ──
function onAction(act, code){
  if(act==='approve') confirmApprove(code);
  else if(act==='accept') confirmAccept(code);
  else if(act==='cancel') confirmCancel(code);
  else if(act==='propose') openPropose(code);
}

var _modalYes=null;
function openModal(title, text, extraHtml, yesLabel, onYes){
  $('cm_title').textContent=title;
  $('cm_text').innerHTML=text;
  $('cm_extra').innerHTML=extraHtml||'';
  $('cm_err').textContent='';
  $('cm_yes').textContent=yesLabel||'확인';
  _modalYes=onYes;
  $('confirmModal').classList.add('show');
}
function closeModal(){ $('confirmModal').classList.remove('show'); _modalYes=null; }
$('cm_no').addEventListener('click', closeModal);
$('cm_yes').addEventListener('click', function(){ if(_modalYes) _modalYes(); });

function modalErr(m){ $('cm_err').textContent=m||''; }
function modalBusy(b){ $('cm_yes').disabled=b; $('cm_yes').textContent=b?'처리 중…':$('cm_yes').dataset.lbl||'확인'; }

function confirmApprove(code){
  var c=curDetail.consult;
  openModal('승인할까요?', '<b>'+esc(curDetail.names)+'</b><br>'+esc(c.date)+' · '+esc(c.time)+'<br>승인하면 캘린더 등록 + 확정됩니다.', '', '승인', function(){
    modalBusy(true); modalErr('');
    gas('adminApprove', code).then(function(d){
      if(d&&d.ok){ closeModal(); toast('✓ 확정됨'); loadHome(); }
      else { modalBusy(false); modalErr(d&&d.error||'실패'); }
    }).catch(function(e){ modalBusy(false); modalErr('오류: '+(e&&e.message||e)); });
  });
}
function confirmAccept(code){
  var c=curDetail.consult;
  openModal('변경 제안을 수락할까요?', '<b>'+esc(curDetail.names)+'</b><br>제안: '+esc(c.proposedDate)+' '+esc(c.proposedTime)+'<br>수락하면 그 시간으로 확정됩니다.', '', '수락', function(){
    modalBusy(true); modalErr('');
    gas('adminAcceptProposal', code).then(function(d){
      if(d&&d.ok){ closeModal(); toast('✓ 확정됨'); loadHome(); }
      else { modalBusy(false); modalErr(d&&d.error||'실패'); }
    }).catch(function(e){ modalBusy(false); modalErr('오류'); });
  });
}
function confirmCancel(code){
  var extra='<div class="field"><label>취소 사유</label><select id="cancelReason">'+
    '<option value="고객 요청">고객 요청</option>'+
    '<option value="노쇼">노쇼</option>'+
    '<option value="일정 안 맞음">일정 안 맞음</option>'+
    '<option value="기타">기타</option></select></div>';
  openModal('예약을 취소할까요?', '<b>'+esc(curDetail.names)+'</b><br>취소하면 캘린더 일정이 삭제됩니다.', extra, '취소 확정', function(){
    var reason=$('cancelReason')?$('cancelReason').value:'';
    modalBusy(true); modalErr('');
    gas('adminCancel', code, reason).then(function(d){
      if(d&&d.ok){ closeModal(); toast('취소됨'); loadHome(); }
      else { modalBusy(false); modalErr(d&&d.error||'실패'); }
    }).catch(function(e){ modalBusy(false); modalErr('오류'); });
  });
}

// 변경 제안 입력창 (날짜·시간)
function openPropose(code){
  // 슬롯 로드 후 모달
  gas('adminAvailability').then(function(d){
    if(d&&d.ok){ SLOTS.weekday=d.slotsWeekday||[]; SLOTS.weekend=d.slotsWeekend||[]; }
    var extra='<div class="field"><label>날짜</label><input type="date" id="pDate"></div>'+
      '<div class="field"><label>시간</label><select id="pTime"><option value="">날짜를 먼저 선택</option></select></div>'+
      '<div class="field"><label>메모(선택)</label><input type="text" id="pMemo" placeholder="고객에게 전할 한마디"></div>';
    openModal('시간 변경 제안', '<b>'+esc(curDetail.names)+'</b>님께 새 시간을 제안합니다.', extra, '제안 보내기', function(){
      var nd=$('pDate').value, nt=$('pTime').value;
      if(!nd||!nt){ modalErr('날짜와 시간을 선택해 주세요.'); return; }
      modalBusy(true); modalErr('');
      gas('adminProposeTime', code, nd, nt, $('pMemo').value||'').then(function(r){
        if(r&&r.ok){ closeModal(); toast('변경 제안을 보냈어요'); openDetail(code); }
        else { modalBusy(false); modalErr(r&&r.error||'실패'); }
      }).catch(function(e){ modalBusy(false); modalErr('오류'); });
    });
    // 날짜 선택 시 요일별 슬롯 채우기
    var pd=$('pDate');
    if(pd){ pd.addEventListener('change', function(){ fillTimes(pd.value); }); }
  }).catch(function(){ toast('슬롯 로드 실패'); });
}
function fillTimes(dateStr){
  var sel=$('pTime'); if(!sel) return;
  var slots=[];
  if(dateStr){ var d=new Date(dateStr+'T00:00:00'); var wd=d.getDay(); slots=(wd===0||wd===6)?SLOTS.weekend:SLOTS.weekday; }
  sel.innerHTML = slots.length ? slots.map(function(s){return '<option value="'+s+'">'+s+'</option>';}).join('') : '<option value="">가능한 시간 없음</option>';
}

// 메모 저장
function saveMemo(){
  var memo=$('memoArea').value;
  $('memoSave').disabled=true; $('memoSave').textContent='저장 중…';
  gas('adminSaveMemo', curDetail.code, memo).then(function(d){
    $('memoSave').disabled=false; $('memoSave').textContent='메모 저장';
    toast(d&&d.ok?'저장됨':'저장 실패');
  }).catch(function(){ $('memoSave').disabled=false; $('memoSave').textContent='메모 저장'; toast('오류'); });
}
</script>
