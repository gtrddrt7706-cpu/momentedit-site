<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moment Edit · 수익성 시뮬레이터 (상세)</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #FAF9F7; }
input[type="range"] { -webkit-appearance: auto; appearance: auto; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const COLORS = {
  bg: "#FAF9F7", card: "#FFFFFF", text: "#1A1A1A", sub: "#6B6560",
  accent: "#2C2825", green: "#2D6A4F", greenLight: "#D8F3DC",
  red: "#9B2226", redLight: "#FDDEDE", amber: "#B8860B",
  amberLight: "#FFF3CD", border: "#E8E4DF", highlight: "#F0ECE6",
};

const EMPLOYER_INSURANCE_RATE = 0.108;
const insuranceLabels = [
  { name: "국민연금", rate: "4.75%" },
  { name: "건강보험", rate: "3.595%" },
  { name: "장기요양", rate: "0.47%" },
  { name: "고용보험", rate: "1.15%" },
  { name: "산재보험", rate: "~0.8%" },
];

function fmt(n) {
  if (Math.abs(n) >= 10000) return (n / 10000).toFixed(1) + "억";
  return n.toLocaleString() + "만";
}

function fmtFull(n) {
  return "₩" + (n * 10000).toLocaleString();
}

function Slider({ label, value, onChange, min, max, step, unit = "만원", formatFn }) {
  const display = formatFn ? formatFn(value) : value.toLocaleString() + unit;
  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
        <span style={{ fontSize: 13, color: COLORS.sub, letterSpacing: "0.02em" }}>{label}</span>
        <span style={{ fontSize: 14, fontWeight: 600, color: COLORS.text, fontFamily: "'Playfair Display', Georgia, serif" }}>{display}</span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={(e) => onChange(Number(e.target.value))}
        style={{ width: "100%", accentColor: COLORS.accent, cursor: "pointer" }} />
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: COLORS.sub, marginTop: 2 }}>
        <span>{formatFn ? formatFn(min) : min.toLocaleString() + unit}</span>
        <span>{formatFn ? formatFn(max) : max.toLocaleString() + unit}</span>
      </div>
    </div>
  );
}

function MetricCard({ label, value, sub, positive, neutral }) {
  const bg = neutral ? COLORS.amberLight : positive ? COLORS.greenLight : COLORS.redLight;
  const color = neutral ? COLORS.amber : positive ? COLORS.green : COLORS.red;
  return (
    <div style={{ background: bg, borderRadius: 10, padding: "16px 18px", flex: 1, minWidth: 140 }}>
      <div style={{ fontSize: 11, color: COLORS.sub, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 6 }}>{label}</div>
      <div style={{ fontSize: 22, fontWeight: 700, color, fontFamily: "'Playfair Display', Georgia, serif" }}>{value}</div>
      {sub && <div style={{ fontSize: 12, color: COLORS.sub, marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

function BarRow({ label, revenue, cost, maxVal }) {
  const profit = revenue - cost;
  const w = (v) => Math.max(2, (v / maxVal) * 100) + "%";
  const positive = profit >= 0;
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: COLORS.sub, marginBottom: 4 }}>
        <span>{label}</span>
        <span style={{ color: positive ? COLORS.green : COLORS.red, fontWeight: 600 }}>
          {positive ? "+" : ""}{fmt(profit)}
        </span>
      </div>
      <div style={{ display: "flex", gap: 3, alignItems: "center" }}>
        <div style={{ height: 18, width: w(revenue), background: COLORS.green, borderRadius: 3, transition: "width 0.3s" }} />
        <span style={{ fontSize: 10, color: COLORS.green, whiteSpace: "nowrap" }}>{fmt(revenue)}</span>
      </div>
      <div style={{ display: "flex", gap: 3, alignItems: "center", marginTop: 2 }}>
        <div style={{ height: 18, width: w(cost), background: COLORS.red, borderRadius: 3, opacity: 0.7, transition: "width 0.3s" }} />
        <span style={{ fontSize: 10, color: COLORS.red, whiteSpace: "nowrap" }}>{fmt(cost)}</span>
      </div>
    </div>
  );
}

function App() {
  const [fixedCost, setFixedCost] = useState(400);
  const [varCost, setVarCost] = useState(25);
  const [weekendCount, setWeekendCount] = useState(3);
  const [weekdayCount, setWeekdayCount] = useState(1);
  const [empAnnual, setEmpAnnual] = useState(3000);
  const [empCount, setEmpCount] = useState(1);
  const [freelancerCost, setFreelancerCost] = useState(0);
  const [isOpening, setIsOpening] = useState(true);

  const prices = useMemo(() => ({
    weekend: isOpening ? 180 : 210,
    weekday: isOpening ? 120 : 150,
  }), [isOpening]);

  const labor = useMemo(() => {
    const empMonthly = Math.round(empAnnual / 12);
    const empGross = empMonthly * empCount;
    const insurance = Math.round(empGross * EMPLOYER_INSURANCE_RATE);
    const totalLabor = empGross + insurance + freelancerCost;
    return { empMonthly, empGross, insurance, totalLabor };
  }, [empAnnual, empCount, freelancerCost]);

  const monthly = useMemo(() => {
    const totalEvents = weekendCount + weekdayCount;
    const grossRevenue = prices.weekend * weekendCount + prices.weekday * weekdayCount;
    const vat = Math.round(grossRevenue * 10 / 110);
    const netRevenue = grossRevenue - vat;
    const totalVar = varCost * totalEvents;
    const totalCost = fixedCost + labor.totalLabor + totalVar;
    const profit = netRevenue - totalCost;
    const margin = netRevenue > 0 ? (profit / netRevenue) * 100 : 0;
    return { grossRevenue, vat, netRevenue, totalCost, totalVar, profit, margin, totalEvents };
  }, [fixedCost, varCost, labor, weekendCount, weekdayCount, prices]);

  const breakeven = useMemo(() => {
    const avgPrice = weekendCount + weekdayCount > 0
      ? (prices.weekend * weekendCount + prices.weekday * weekdayCount) / (weekendCount + weekdayCount)
      : prices.weekend;
    const avgPriceAfterVat = avgPrice * 100 / 110;
    const contribution = avgPriceAfterVat - varCost;
    const totalFixed = fixedCost + labor.totalLabor;
    return contribution > 0 ? Math.ceil(totalFixed / contribution) : Infinity;
  }, [fixedCost, varCost, labor, weekendCount, weekdayCount, prices]);

  const annual = useMemo(() => ({
    revenue: monthly.netRevenue * 12,
    cost: monthly.totalCost * 12,
    profit: monthly.profit * 12,
  }), [monthly]);

  const scenarios = useMemo(() => {
    const calc = (we, wd) => {
      const gross = prices.weekend * we + prices.weekday * wd;
      const vat = Math.round(gross * 10 / 110);
      const net = gross - vat;
      const cost = fixedCost + labor.totalLabor + varCost * (we + wd);
      return { revenue: net, cost, profit: net - cost, events: we + wd, we, wd };
    };
    return {
      conservative: calc(2, 0),
      moderate: calc(4, 1),
      optimistic: calc(6, 2),
      ambitious: calc(8, 4),
    };
  }, [fixedCost, varCost, labor, prices]);

  const maxBar = Math.max(...Object.values(scenarios).map(s => Math.max(s.revenue, s.cost)), 100);
  const isProfitable = monthly.profit > 0;

  return (
    <div style={{ fontFamily: "'Helvetica Neue', 'Noto Sans KR', sans-serif", background: COLORS.bg, minHeight: "100vh", padding: "32px 20px", color: COLORS.text }}>
      <div style={{ maxWidth: 520, margin: "0 auto" }}>
        <div style={{ textAlign: "center", marginBottom: 32 }}>
          <div style={{ fontSize: 11, letterSpacing: "0.2em", color: COLORS.sub, textTransform: "uppercase", marginBottom: 8 }}>MOMENT EDIT</div>
          <h1 style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 26, fontWeight: 400, margin: 0, letterSpacing: "-0.02em" }}>수익성 시뮬레이터</h1>
          <div style={{ fontSize: 12, color: COLORS.sub, marginTop: 6 }}>상세 버전 · VAT + 인건비 + 4대보험 반영</div>
          <div style={{ width: 40, height: 1, background: COLORS.accent, margin: "12px auto 0" }} />
        </div>

        {/* Pricing Toggle */}
        <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 28 }}>
          {[{ val: true, label: "오프닝 가격", sub: "27년 상반기" }, { val: false, label: "정상 가격", sub: "정규 운영" }].map(({ val, label, sub }) => (
            <button key={String(val)} onClick={() => setIsOpening(val)} style={{
              padding: "10px 20px", border: `1px solid ${isOpening === val ? COLORS.accent : COLORS.border}`,
              borderRadius: 8, background: isOpening === val ? COLORS.accent : COLORS.card,
              color: isOpening === val ? "#fff" : COLORS.text, cursor: "pointer", fontSize: 13, fontWeight: 500, transition: "all 0.2s", lineHeight: 1.4,
            }}>
              {label}<div style={{ fontSize: 10, opacity: 0.7 }}>{sub}</div>
            </button>
          ))}
        </div>

        <div style={{ display: "flex", justifyContent: "center", gap: 24, marginBottom: 28, fontSize: 13, color: COLORS.sub }}>
          <span>주말·공휴일 <b style={{ color: COLORS.text }}>{fmtFull(prices.weekend)}</b></span>
          <span style={{ color: COLORS.border }}>|</span>
          <span>평일 <b style={{ color: COLORS.text }}>{fmtFull(prices.weekday)}</b></span>
        </div>

        {/* Cost Sliders */}
        <div style={{ background: COLORS.card, borderRadius: 12, padding: "24px 22px", border: `1px solid ${COLORS.border}`, marginBottom: 24 }}>
          <div style={{ fontSize: 11, letterSpacing: "0.1em", color: COLORS.sub, textTransform: "uppercase", marginBottom: 18 }}>비용 설정</div>
          <Slider label="월 고정비용 (임대·관리비 등)" value={fixedCost} onChange={setFixedCost} min={200} max={2000} step={50} />
          <Slider label="건당 변동비용 (꽃·식사 등)" value={varCost} onChange={setVarCost} min={10} max={80} step={5} />
        </div>

        {/* Labor Section */}
        <div style={{ background: COLORS.card, borderRadius: 12, padding: "24px 22px", border: `1px solid ${COLORS.border}`, marginBottom: 24 }}>
          <div style={{ fontSize: 11, letterSpacing: "0.1em", color: COLORS.sub, textTransform: "uppercase", marginBottom: 18 }}>인건비 설정</div>

          <div style={{ fontSize: 12, color: COLORS.accent, fontWeight: 600, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: COLORS.accent }} />
            정직원 (4대보험 가입)
          </div>
          <Slider label="1인 세전 연봉" value={empAnnual} onChange={setEmpAnnual} min={0} max={8000} step={100} />
          <div style={{ textAlign: "right", fontSize: 11, color: COLORS.sub, marginTop: -14, marginBottom: 14 }}>
            월 환산: {fmt(labor.empMonthly)}
          </div>
          <Slider label="정직원 수" value={empCount} onChange={setEmpCount} min={0} max={10} step={1} unit="명" formatFn={(v) => v + "명"} />

          {empCount > 0 && empAnnual > 0 && (
            <div style={{ background: COLORS.highlight, borderRadius: 8, padding: "12px 14px", marginBottom: 18, fontSize: 12, lineHeight: 1.8, color: COLORS.sub }}>
              <div style={{ display: "flex", justifyContent: "space-between" }}>
                <span>급여 합계</span>
                <span style={{ color: COLORS.text }}>{fmt(labor.empGross)}</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between" }}>
                <span>4대보험 사업주 부담 (~10.8%)</span>
                <span style={{ color: COLORS.red }}>+{fmt(labor.insurance)}</span>
              </div>
              <div style={{ height: 1, background: COLORS.border, margin: "6px 0" }} />
              <div style={{ display: "flex", justifyContent: "space-between", fontWeight: 600, color: COLORS.text }}>
                <span>정직원 소계</span>
                <span>{fmt(labor.empGross + labor.insurance)}</span>
              </div>
              <div style={{ marginTop: 8, fontSize: 11, color: COLORS.sub, lineHeight: 1.5 }}>
                {insuranceLabels.map((item, i) => (
                  <span key={i}>{item.name} {item.rate}{i < insuranceLabels.length - 1 ? " · " : ""}</span>
                ))}
              </div>
            </div>
          )}

          <div style={{ fontSize: 12, color: COLORS.accent, fontWeight: 600, marginBottom: 10, marginTop: 6, display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: COLORS.accent }} />
            프리랜서 (3.3% 원천징수)
          </div>
          <Slider label="월 프리랜서 지급 총액" value={freelancerCost} onChange={setFreelancerCost} min={0} max={1000} step={10} />

          <div style={{ textAlign: "center", fontSize: 13, color: COLORS.sub, background: COLORS.highlight, borderRadius: 6, padding: "10px 0", marginTop: 4 }}>
            인건비 합계 <b style={{ color: COLORS.text }}>{fmt(labor.totalLabor)}</b>
            <span style={{ fontSize: 11, marginLeft: 6 }}>(4대보험 포함)</span>
          </div>
        </div>

        {/* Booking Count */}
        <div style={{ background: COLORS.card, borderRadius: 12, padding: "24px 22px", border: `1px solid ${COLORS.border}`, marginBottom: 24 }}>
          <div style={{ fontSize: 11, letterSpacing: "0.1em", color: COLORS.sub, textTransform: "uppercase", marginBottom: 18 }}>월 예약 건수</div>
          <Slider label="주말·공휴일 예약" value={weekendCount} onChange={setWeekendCount} min={0} max={30} step={1} unit="건" formatFn={(v) => v + "건"} />
          <Slider label="평일 예약" value={weekdayCount} onChange={setWeekdayCount} min={0} max={15} step={1} unit="건" formatFn={(v) => v + "건"} />
          <div style={{ textAlign: "center", fontSize: 13, color: COLORS.sub, background: COLORS.highlight, borderRadius: 6, padding: "8px 0", marginTop: 4 }}>
            월 총 <b style={{ color: COLORS.text }}>{weekendCount + weekdayCount}건</b>
          </div>
        </div>

        {/* Key Metrics */}
        <div style={{ display: "flex", gap: 10, marginBottom: 24, flexWrap: "wrap" }}>
          <MetricCard label="월 순이익" value={(isProfitable ? "+" : "") + fmt(monthly.profit)} sub={`마진 ${monthly.margin.toFixed(0)}% · VAT 제외 기준`} positive={isProfitable} />
          <MetricCard label="손익분기" value={breakeven === Infinity ? "—" : `월 ${breakeven}건`} sub={breakeven <= 4 ? "달성 가능" : breakeven <= 6 ? "도전적" : "어려움"} positive={breakeven <= 4} neutral={breakeven > 4 && breakeven <= 6} />
          <MetricCard label="연간 순이익" value={(annual.profit >= 0 ? "+" : "") + fmt(annual.profit)} sub={`매출 ${fmt(annual.revenue)}`} positive={annual.profit >= 0} />
        </div>

        {/* Scenario Chart */}
        <div style={{ background: COLORS.card, borderRadius: 12, padding: "24px 22px", border: `1px solid ${COLORS.border}`, marginBottom: 24 }}>
          <div style={{ fontSize: 11, letterSpacing: "0.1em", color: COLORS.sub, textTransform: "uppercase", marginBottom: 4 }}>시나리오 비교</div>
          <div style={{ fontSize: 12, color: COLORS.sub, marginBottom: 18 }}>
            고정비·변동비는 위 설정 기준 · <span style={{ color: COLORS.green }}>■</span> 매출 <span style={{ color: COLORS.red, opacity: 0.7 }}>■</span> 비용
          </div>
          {[
            { key: "conservative", label: `보수 (주말·공휴${scenarios.conservative.we} 평일${scenarios.conservative.wd})` },
            { key: "moderate", label: `보통 (주말·공휴${scenarios.moderate.we} 평일${scenarios.moderate.wd})` },
            { key: "optimistic", label: `낙관 (주말·공휴${scenarios.optimistic.we} 평일${scenarios.optimistic.wd})` },
            { key: "ambitious", label: `적극 (주말·공휴${scenarios.ambitious.we} 평일${scenarios.ambitious.wd})` },
          ].map(({ key, label }) => (
            <BarRow key={key} label={label} revenue={scenarios[key].revenue} cost={scenarios[key].cost} maxVal={maxBar} />
          ))}
        </div>

        {/* Breakdown Table */}
        <div style={{ background: COLORS.card, borderRadius: 12, padding: "24px 22px", border: `1px solid ${COLORS.border}`, marginBottom: 24 }}>
          <div style={{ fontSize: 11, letterSpacing: "0.1em", color: COLORS.sub, textTransform: "uppercase", marginBottom: 16 }}>월간 손익 상세</div>
          {[
            { label: "주말·공휴일 매출", value: `${prices.weekend} × ${weekendCount} = ${fmt(prices.weekend * weekendCount)}` },
            { label: "평일 매출", value: `${prices.weekday} × ${weekdayCount} = ${fmt(prices.weekday * weekdayCount)}` },
            { label: "총 매출 (VAT 포함)", value: fmt(monthly.grossRevenue), bold: true, color: COLORS.text },
            { label: "부가세 (10%)", value: `-${fmt(monthly.vat)}`, color: COLORS.amber },
            { label: "순매출 (VAT 제외)", value: fmt(monthly.netRevenue), bold: true, color: COLORS.text },
            { divider: true },
            { label: "고정비용", value: `-${fmt(fixedCost)}`, color: COLORS.red },
            { label: `정직원 급여 (${empCount}명)`, value: `-${fmt(labor.empGross)}`, color: COLORS.red },
            { label: "┗ 4대보험 사업주 부담", value: `-${fmt(labor.insurance)}`, color: COLORS.red, indent: true },
            { label: "프리랜서 지급", value: `-${fmt(freelancerCost)}`, color: COLORS.red },
            { label: "변동비용", value: `-${fmt(monthly.totalVar)}  (${varCost}만 × ${monthly.totalEvents}건)`, color: COLORS.red },
            { label: "총 비용", value: `-${fmt(monthly.totalCost)}`, bold: true, color: COLORS.red },
            { divider: true },
            { label: "순이익", value: (isProfitable ? "+" : "") + fmt(monthly.profit), bold: true, color: isProfitable ? COLORS.green : COLORS.red },
          ].map((row, i) => row.divider
            ? <div key={i} style={{ height: 1, background: COLORS.border, margin: "10px 0" }} />
            : <div key={i} style={{
                display: "flex", justifyContent: "space-between", padding: "5px 0",
                paddingLeft: row.indent ? 12 : 0, fontSize: row.indent ? 12 : 13,
                fontWeight: row.bold ? 600 : 400, color: row.color || COLORS.sub, opacity: row.indent ? 0.8 : 1,
              }}>
                <span>{row.label}</span>
                <span style={{ fontFamily: "'Playfair Display', Georgia, serif" }}>{row.value}</span>
              </div>
          )}
        </div>

        {/* Insight */}
        <div style={{ background: COLORS.highlight, borderRadius: 12, padding: "20px 22px", fontSize: 13, lineHeight: 1.7, color: COLORS.sub, border: `1px solid ${COLORS.border}` }}>
          <div style={{ fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 10, color: COLORS.accent }}>💡 인사이트</div>
          {breakeven <= 3
            ? <span>현재 비용 구조에서 <b style={{ color: COLORS.green }}>월 {breakeven}건만으로 손익분기</b> 달성 가능. 변동비가 낮아 건수가 늘수록 수익성이 빠르게 개선되는 구조입니다.</span>
            : breakeven <= 5
            ? <span>손익분기점이 월 {breakeven}건으로, <b>초기에는 주말 중심으로 안정적 예약 확보</b>가 핵심입니다. 평일 1~2건 추가 시 수익성이 크게 개선됩니다.</span>
            : <span>현재 비용 구조에서 손익분기가 월 {breakeven}건으로 높은 편입니다. <b style={{ color: COLORS.red }}>고정비 절감 또는 단가 조정</b>을 검토해 보세요.</span>
          }
        </div>

        <div style={{ textAlign: "center", fontSize: 11, color: COLORS.border, marginTop: 24, paddingBottom: 20 }}>MOMENT EDIT · Profitability Simulator</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
