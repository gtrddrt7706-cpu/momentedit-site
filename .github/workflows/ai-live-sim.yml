# AI 라이브 시뮬레이션 — 운영 서버의 상담·스케줄 AI에 멀티턴 시나리오를 보내 자동 채점.
# 트리거: scripts/.sim-run 파일이 갱신된 푸시(어느 브랜치든). 로그에서 대화 원문과 채점표 확인.
name: AI Live Simulation
on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/.sim-run'

jobs:
  simulate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run live simulation against production
        run: node scripts/ai-live-sim-ci.js
