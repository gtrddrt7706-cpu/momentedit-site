# 배포 검증 유틸 — 라이브(momentedit.kr) 정적 파일에 기대 문자열이 있는지 확인 (수동 실행)
name: Deploy Check
on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/.deploy-check-run'
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check live admin.html formula
        run: |
          curl -sSL https://momentedit.kr/admin.html -o live-admin.html
          echo "── 시착 공제 공식 ──"
          grep -o 'ded=Math.min(fc\*[0-9]*,[0-9]*)' live-admin.html || echo "패턴 미발견"
          echo "── 안내 문구 ──"
          grep -o '벌수×[0-9,]*원 공제' live-admin.html || true
          grep -o '1벌 [0-9,]*원 · 별도 청구' live-admin.html || true
          echo "── 결제 요약 예약금 상수 ──"
          grep -o '_RES=[0-9]*' live-admin.html || true
          echo "── 옛 공식(70000/200000) 잔존 여부 ──"
          if grep -q 'fc\*70000' live-admin.html; then echo "❌ 옛 공식 발견"; exit 1; else echo "✅ 옛 공식 없음"; fi
      - name: Concierge Kakao key diagnostics (probe)
        run: |
          P=$(curl -sSL -X POST https://www.momentedit.kr/api/after-concierge -H 'content-type: application/json' -d '{"probe":true}')
          echo "probe: $P"
          echo "$P" | grep -q '"keyPresent":true' || { echo "❌ KAKAO_REST_KEY가 함수에 주입 안 됨(Vercel env 저장값 비었거나 미적용)"; exit 1; }
          echo "$P" | grep -q '"kakaoHttp":200' || { echo "❌ 카카오 응답 비정상(401=키 오류) ↑ kakaoHttp 확인"; exit 1; }
          echo "✅ 키 주입 + 카카오 200"
      - name: After-Wedding Concierge end-to-end (Kakao grounding)
        run: |
          echo "── 키즈 니즈 → 카카오 지도 검색 ──"
          R=$(curl -sSL -X POST https://www.momentedit.kr/api/after-concierge \
            -H 'content-type: application/json' \
            -d '{"messages":[{"role":"user","content":"애 둘 데리고 갈 만한 키즈카페 있을까요? 인원은 어른 4명 아이 2명이요"}]}')
          echo "$R" | head -c 1200; echo
          echo "$R" | grep -q '"ok":true' || { echo "❌ ok 아님"; exit 1; }
          if echo "$R" | grep -q '"source":"kakao"'; then
            echo "$R" | grep -q '"places":\[\{' && echo "✅ 카카오 지도 실업체 카드 수신" || { echo "❌ places 비어있음"; exit 1; }
          elif echo "$R" | grep -q '"ask":"[^"]'; then
            echo "ℹ️ AI가 니즈 후속질문 단계(정상) — 2턴째로 재시도"
            R2=$(curl -sSL -X POST https://www.momentedit.kr/api/after-concierge \
              -H 'content-type: application/json' \
              -d '{"messages":[{"role":"user","content":"애 둘 데리고 갈 키즈카페요"},{"role":"assistant","content":"몇 분이서 가세요?"},{"role":"user","content":"어른 4명 아이 2명이요"}]}')
            echo "$R2" | head -c 1200; echo
            echo "$R2" | grep -q '"places":\[\{' && echo "✅ 2턴째 지도 카드 수신" || { echo "❌ 2턴에도 places 없음(KAKAO_REST_KEY 점검)"; exit 1; }
          else
            echo "❌ kakao 검색 미작동(mapDown? KAKAO_REST_KEY 점검)"; exit 1
          fi
